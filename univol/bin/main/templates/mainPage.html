<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIVOL</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: sans-serif;
        }
        header {
            background-color: #426B1F;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            color: white;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 15px;
        }
        .nav a:hover {
            text-decoration: underline;
        }
        .hero {
            text-align: center;
            padding: 100px 20px;
        }
        .hero h1 {
            font-size: 36px;
            color: #426B1F;
        }
        .hero p {
            font-size: 18px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <header>
        <span class="logo">UNIVOL</span>
        <nav class="nav">
            <!-- 로그인 안 했을 때 -->
            <span th:if="${session.loginUser == null}">
                <a th:href="@{/logIn}">로그인</a>
                <a th:href="@{/join}">회원가입</a>
            </span>
            <!-- 로그인 했을 때 -->
            <span th:if="${session.loginUser != null}">
                <span th:text="${session.loginUser.userName}"></span>님
                <a th:href="@{/logout}">로그아웃</a>
                <a th:href="@{/mypage}">마이페이지</a>
            </span>
        </nav>
    </header>

    <section class="hero">
        <h1>봉사활동 플랫폼 UNIVOL</h1>
        <p>다양한 봉사활동에 참여해보세요!</p>
    </section>

</body>
</html>
