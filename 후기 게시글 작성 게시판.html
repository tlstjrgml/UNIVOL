<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>후기 작성</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 400px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #426B1F;
        }

        h3 {
            text-align: center;
            margin-bottom: 20px;

        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid black;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.2s;
        }

        input:focus,
        textarea:focus {
            border-color: #4a90e2;
            outline: none;
            box-shadow: 0 0 5px rgba(74, 144, 226, 0.3);
        }

        textarea {
            resize: none;
            height: 150px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #426B1F;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #357abd;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>UNIVOL</h1>

        <h3>후기글 작성</h3>

        <div class="form-group">
            <label for="title">후기 게시글 작성</label>
            <input type="text" id="title" placeholder="제목을 입력하세요">
        </div>

        <div class="form-group">
            <label for="content">내용</label>
            <textarea id="content" placeholder="내용을 입력하세요"></textarea>
        </div>

        <button>완료</button>
    </div>
</body>

</html>
