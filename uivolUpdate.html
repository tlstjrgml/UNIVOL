<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIVOL</title>
<style>
    #title{color: #426B1F;}
    h1, h2{text-align: center;}
    form{width: 300px; margin: 0 auto; text-align: left;}
    button {display: block; margin: 20px auto;}  
</style>
</head>
<body>
    <h1 id="title">UNIVOL</h1>
    <h2>개인정보 수정</h2>
    <form>
        <label>이름 : </label><input type="text" name="name" /><br/><br/>
        <label>아이디 : </label><input type="text" name="id" /><br/><br/>
        <label>비밀번호 : </label><input type="password" name="pwd" /><br/><br/>
        <label>비밀번호 확인 :</label><input type="password" name="pwdCheck"/><br/><br/>
        <label>생년월일 : </label><input type="date" name="birth"><br/><br/>
        <label>성별 : </label>
        <label for="male">남자</label><input type="radio" id="male" name="gender" value="M" checked/>
        <label for="female">여자</label><input type="radio" id="female" name="gender" value="F" />
        <br/><br/>
        <label>전화번호 : </label><input type="text" name="phone" /><br/><br/>
        <label>주소 : </label><input type="text" name="address" /><br/><br/>
        <button type="submit">수정하기</button>
    </form>
</body>
</html>
