<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNIVOL : 정보수정</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f7f2;
        margin: 0;
    }

    #title {
        color: #426B1F;
        text-align: center;
        margin-top: 40px;
    }

    h2 {
        text-align: center;
        margin-bottom: 30px;
    }

    .container {
        width: 380px;
        margin: 0 auto;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 15px;
    }

    label {
        font-size: 14px;
        margin-bottom: 5px;
        color: #333;
    }

    input {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        outline: none;
        transition: 0.2s;
    }

    input:focus {
        border-color: #426B1F;
        box-shadow: 0 0 5px rgba(66,107,31,0.3);
    }

    .gender {
        display: flex;
        gap: 15px;
        align-items: center;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        background: #426B1F;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #355616;
    }
</style>
</head>

<body>

<h1 id="title">UNIVOL</h1>
<h2>개인정보 수정</h2>

<div class="container">
    <form>

        <div class="form-group">
            <label for="name">이름</label>
            <input type="text" id="name" name="name">
        </div>

        <div class="form-group">
            <label for="id">아이디</label>
            <input type="text" id="id" name="id">
        </div>

        <div class="form-group">
            <label for="pwd">비밀번호</label>
            <input type="password" id="pwd" name="pwd">
        </div>

        <div class="form-group">
            <label for="pwdCheck">비밀번호 확인</label>
            <input type="password" id="pwdCheck" name="pwdCheck">
        </div>

        <div class="form-group">
            <label for="birth">생년월일</label>
            <input type="date" id="birth" name="birth">
        </div>

        <div class="form-group">
            <label>성별</label>
            <div class="gender">
                <label><input type="radio" name="gender" value="M" checked> 남자</label>
                <label><input type="radio" name="gender" value="F"> 여자</label>
            </div>
        </div>

        <div class="form-group">
            <label for="phone">전화번호</label>
            <input type="tel" id="phone" name="phone">
        </div>

        <div class="form-group">
            <label for="address">주소</label>
            <input type="text" id="address" name="address">
        </div>

        <button type="submit">수정하기</button>

    </form>
</div>

</body>
</html>
