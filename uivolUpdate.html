<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNIVOL : 정보수정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f4f6f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1rem 4rem;
    color: #222;
  }

  .uv-page {
    width: 100%;
    max-width: 560px;
  }

  /* Header */
  .uv-brand {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 400;
    letter-spacing: 0.2em;
    color: #3B6D11;
    margin-bottom: 4px;
  }

  .uv-subtitle {
    font-size: 12px;
    font-weight: 300;
    color: #888;
    letter-spacing: 0.06em;
    margin-bottom: 2.5rem;
  }

  /* Section */
  .uv-section {
    background: #fff;
    border: 1px solid #e4e9dc;
    border-radius: 12px;
    padding: 1.5rem 1.75rem;
    margin-bottom: 1rem;
  }

  .uv-section-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #639922;
    margin-bottom: 1.1rem;
    padding-bottom: 8px;
    border-bottom: 1px solid #C0DD97;
  }

  /* Grid layouts */
  .uv-grid-name {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  .uv-grid-equal {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  /* Field */
  .uv-field {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .uv-field-full {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 10px;
  }

  .uv-field-full:last-child {
    margin-bottom: 0;
  }

  .uv-label {
    font-size: 11px;
    font-weight: 500;
    color: #666;
    letter-spacing: 0.05em;
  }

  /* Input */
  .uv-input {
    padding: 9px 11px;
    border: 1px solid #dde4d4;
    border-radius: 7px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    background: #f8faf5;
    color: #222;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    width: 100%;
  }

  .uv-input:focus {
    border-color: #639922;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(99, 153, 34, 0.1);
  }

  .uv-input::placeholder {
    color: #bbb;
    font-size: 12px;
  }

  /* Gender toggle */
  .uv-gender {
    display: flex;
    border: 1px solid #dde4d4;
    border-radius: 7px;
    overflow: hidden;
    background: #f8faf5;
    height: 36px;
  }

  .uv-gender label {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    font-size: 12px;
    color: #666;
    cursor: pointer;
    border-right: 1px solid #e4e9dc;
    transition: background 0.13s, color 0.13s;
  }

  .uv-gender label:last-child {
    border-right: none;
  }

  .uv-gender input[type="radio"] {
    width: 12px;
    height: 12px;
    accent-color: #639922;
    margin: 0;
  }

  .uv-gender input[type="radio"]:checked + span {
    color: #27500A;
    font-weight: 500;
  }

  .uv-gender label:has(input:checked) {
    background: #EAF3DE;
  }

  /* Password hint */
  .uv-hint {
    font-size: 11px;
    margin-top: 3px;
    min-height: 14px;
  }

  /* Actions */
  .uv-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 1.25rem;
  }

  .uv-btn-primary {
    width: 100%;
    padding: 12px;
    background: #3B6D11;
    color: #EAF3DE;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .uv-btn-primary:hover { background: #27500A; }
  .uv-btn-primary:active { transform: scale(0.99); }

  .uv-btn-ghost {
    width: 100%;
    padding: 10px;
    background: transparent;
    color: #888;
    border: 1px solid #dde4d4;
    border-radius: 8px;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.13s;
  }

  .uv-btn-ghost:hover { background: #f4f6f0; }
</style>
</head>
<body>

<div class="uv-page">
  <p class="uv-brand">UNIVOL</p>
  <p class="uv-subtitle">개인정보 수정 — 대학생 봉사활동 플랫폼</p>

  <div class="uv-section">
    <div class="uv-section-title">기본 정보</div>

    <div class="uv-grid-name">
      <div class="uv-field">
        <label class="uv-label" for="name">이름</label>
        <input class="uv-input" type="text" id="name" name="name" placeholder="홍길동">
      </div>
      <div class="uv-field">
        <label class="uv-label" for="uid">아이디</label>
        <input class="uv-input" type="text" id="uid" name="id" placeholder="user123">
      </div>
    </div>

    <div class="uv-grid-equal">
      <div class="uv-field">
        <label class="uv-label" for="birth">생년월일</label>
        <input class="uv-input" type="date" id="birth" name="birth">
      </div>
      <div class="uv-field">
        <label class="uv-label">성별</label>
        <div class="uv-gender">
          <label>
            <input type="radio" name="gender" value="M" checked>
            <span>남자</span>
          </label>
          <label>
            <input type="radio" name="gender" value="F">
            <span>여자</span>
          </label>
        </div>
      </div>
    </div>

    <div class="uv-field-full">
      <label class="uv-label" for="phone">전화번호</label>
      <input class="uv-input" type="tel" id="phone" name="phone" placeholder="010-0000-0000">
    </div>

    <div class="uv-field-full">
      <label class="uv-label" for="address">주소</label>
      <input class="uv-input" type="text" id="address" name="address" placeholder="서울시 강남구...">
    </div>
  </div>

  <div class="uv-section">
    <div class="uv-section-title">비밀번호 변경</div>

    <div class="uv-grid-equal">
      <div class="uv-field">
        <label class="uv-label" for="pwd">새 비밀번호</label>
        <input class="uv-input" type="password" id="pwd" name="pwd" placeholder="8자 이상">
      </div>
      <div class="uv-field">
        <label class="uv-label" for="pwdCheck">비밀번호 확인</label>
        <input class="uv-input" type="password" id="pwdCheck" name="pwdCheck" placeholder="동일하게 입력">
        <div class="uv-hint" id="mHint"></div>
      </div>
    </div>
  </div>

  <div class="uv-actions">
    <button class="uv-btn-primary" type="button" onclick="handleSubmit()">수정사항 저장하기</button>
    <button class="uv-btn-ghost" type="button">취소</button>
  </div>
</div>

<script>
  const pwd = document.getElementById('pwd');
  const pwdCheck = document.getElementById('pwdCheck');
  const mHint = document.getElementById('mHint');

  function checkMatch() {
    if (!pwdCheck.value) { mHint.textContent = ''; return; }
    const match = pwd.value === pwdCheck.value;
    mHint.textContent = match ? '일치합니다' : '일치하지 않습니다';
    mHint.style.color = match ? '#3B6D11' : '#E24B4A';
  }

  pwd.addEventListener('input', checkMatch);
  pwdCheck.addEventListener('input', checkMatch);

  const phone = document.getElementById('phone');
  phone.addEventListener('input', () => {
    let v = phone.value.replace(/\D/g, '').slice(0, 11);
    if (v.length > 7) v = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7);
    else if (v.length > 3) v = v.slice(0,3) + '-' + v.slice(3);
    phone.value = v;
  });

  function handleSubmit() {
    if (pwd.value && pwd.value !== pwdCheck.value) {
      mHint.textContent = '비밀번호가 일치하지 않습니다';
      mHint.style.color = '#E24B4A';
      pwdCheck.focus();
      return;
    }
    alert('수정사항이 저장되었습니다.');
  }
</script>

</body>
</html>
