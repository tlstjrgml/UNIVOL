<!DOCTYPE html>
<html lang="ko">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta charset="utf-8" />
<title>UNIVOL 로그인</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
<main class="login">
<!-- 배너: UNIVOL 로고 -->
<header class="banner">
    <span class="textBan">UNIVOL</span>
</header>

<!-- Page heading -->
<section class="subject">
    <h1 class="textSub">로그인<br/></h1>
</section>

<!-- Divider line -->
 <hr class="divLine"/>

<!-- Login form -->
<form class="loginForm" method="post">
    <!-- ID field -->
    <div class="id">
        <label class="textId" for="userId">아이디</label>
        <input
          class="div"
          type="text"
          id="userId"
          name="userId"
          placeholder="ID"
        />
    </div>
    <!-- Password field -->
    <div class="pwd">
        <label class="textPwd" for="password">비밀번호</label>
        <input
          class="div"
          type="password"
          id="password"
          name="password"
          placeholder="PWD"
        />
    </div>

    <!-- 버튼들 -->
    <button class="buttonL" type="submit" id="loginBtn">
        <span class="buttonLogin">로그인</span>
    </button>
    <button class="buttonL" type="button" id="joinBtn">
        <span class="buttonUser">회원가입</span>
    </button>
</form>
</main>
<script>
    const loginForm = document.querySelector('.loginForm');
    const joinBtn = document.getElementById('joinBtn');

    loginForm.addEventListener('submit', (e) => {
        e.formDefault(); // 폼 제출했을 때 페이지 세로고침 막기.

        const idInput = document.getElementById('userId');
        const pwInput = document.getElementById('password');

        const userId = idInput.value;
        const userPwd = pwInput.value;

        if(userId && userPwd){
            // 실제 DB와의 대조..
            window.location.href='main.html';

        }else{
            alert('아이디 또는 비밀번호를 잘못 입력하셨습니다. 다시 입력해주세요.');
            // 입력한 아이디, 비밀번호 드래그 처리
            idInput.select();
            pwInput.select();
            idInput.focus();

        }
    });

    joinBtn.addEventListener('click', () => {
        // 회원가입 페이지로 이동하기.
        window.location.href = 'signup.html';
    });
</script>
</body>
</html>
