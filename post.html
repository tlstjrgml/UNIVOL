<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>봉사 게시글 상세</title>

  <!-- 폰트 -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      padding: 30px;
    }

    /* 로고 */
    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 40px;
      color: #424B1F;
      margin-bottom: 10px;
      letter-spacing: 2px;
      text-align: center;
    }

    /* 페이지 제목 */
    .page-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
      text-align: center;
    }

    /* 구분선 */
    .divider {
      border: none;
      border-top: 1px solid #ccc;
      margin: 10px 0 20px 0;
    }

    .container {
      width: 800px;
      margin: 0 auto;
    }

    .post-box, .comment-box {
      background-color: white;
      border: 1px solid #ccc;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .post-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .post-info {
      font-size: 14px;
      color: gray;
      margin-bottom: 20px;
    }

    .volunteer-info {
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 20px;
    }

    .post-content {
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .btn-area {
      text-align: right;
    }

    button {
      padding: 8px 15px;
      margin-left: 5px;
      cursor: pointer;
      border-radius: 10px;
      background-color: #424B1F;
      color: white;
      border: none;
    }

    button:hover {
      background-color: #2f3616;
    }

    .comment-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    textarea {
      width: 100%;
      height: 80px;
      padding: 10px;
      margin-bottom: 10px;
      resize: none;
    }

    .comment-item {
      border-top: 1px solid #ddd;
      padding: 10px 0;
    }

    .comment-writer {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .comment-date {
      font-size: 12px;
      color: gray;
      margin-bottom: 5px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th {
      background: #f0f0f0;
      width: 120px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }
  </style>
</head>
<body>

  <!-- 로고 -->
  <div class="logo">UNIVOL</div>

  <!-- 페이지 제목 -->
  <div class="page-title">게시글 조회</div>

  <div class="container">

    <!-- 🔥 위치 이동된 hr -->
    <hr class="divider">

    <div class="post-box">
      <div class="post-title">2024 겨울방학 청소년 멘토링 봉사 모집</div>
      <div class="post-info">작성자: 김민준 | 작성일: 2024.12.10 | 조회수: 342</div>

      <div class="volunteer-info">
        <table>
          <tr>
            <th>봉사제목</th>
            <td>2024 겨울방학 청소년 멘토링 봉사</td>
          </tr>
          <tr>
            <th>봉사장소</th>
            <td>서울시 종로구 대왕빌딩</td>
          </tr>
          <tr>
            <th>봉사날짜</th>
            <td>2025년 1월 4일 ~ 2월 15일</td>
          </tr>
        </table>
      </div>

      <div class="post-content">
        봉사내용
      </div>

      <div class="btn-area">
        <button>수정</button>
        <button>삭제</button>
      </div>
    </div>

    <div class="comment-box">
      <div class="comment-title">댓글</div>
      <textarea placeholder="댓글을 입력하세요"></textarea>
      <div class="btn-area">
        <button>등록</button>
      </div>

      <div class="comment-item">
        <div class="comment-writer">이수연</div>
        <div class="comment-date">2024.12.11</div>
        <div>정말 좋은 활동이네요!</div>
      </div>
    </div>

  </div>
</body>
</html>
