<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>게시글 작성</title>
  <style>

    body {
  font-family: Arial, sans-serif;
  background-color: #f5f5f5;
}

.container {
  width: 500px;
  margin: 50px auto;
  background: #fff;
  padding: 20px 30px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.form-group {
  margin-bottom: 15px;
}

label {
  display: block;
  margin-bottom: 5px;
  font-weight: bold;
}

input, textarea {
  width: 100%;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 5px;
}

textarea {
  resize: none;
}

.btn-group {
  text-align: center;
}

button {
  padding: 10px 20px;
  margin: 5px;
  border: none;
  background-color: #4CAF50;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

button[type="reset"] {
  background-color: #888;
}

button:hover {
  opacity: 0.9;
}
  </style>
</head>
<body>

  <div class="container">
    <h2>봉사 게시글 작성</h2>

    <form>
      <div class="form-group">
        <label for="title">제목</label>
        <input type="text" id="title" placeholder="제목을 입력하세요">
      </div>

      <div class="form-group">
        <label for="place">봉사 장소</label>
        <input type="text" id="place" placeholder="봉사 장소를 입력하세요">
      </div>

      <div class="form-group">
        <label for="date">봉사 날짜</label>
        <input type="date" id="date">
      </div>

      <div class="form-group">
        <label for="content">내용</label>
        <textarea id="content" rows="10" placeholder="내용을 입력하세요"></textarea>
      </div>

      <div class="btn-group">
        <button type="submit">등록</button>
        <button type="reset">취소</button>
      </div>
    </form>
  </div>

</body>
</html>
