
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIVOL 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@500&family=Playfair+Display:wght@700&family=Roboto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            justify-content: center;
            background-color: #ffffff;
        }
        .login {
            width: 100%;
            padding: 20px;
        }
        .banner, .subject {
            text-align: center;
            /* padding-left: 30px; */
        }
        .banner .textBan {
            display: inline-block;
            margin-top: 50px;
            font-size: 40px;
            font-family: "Newsreader", serif;
            font-weight: 500;
            color: #426B1F;
            letter-spacing: 2px;
            
        }
        .subject .textSub {
            font-size: 24px;
            font-weight: 400;
            margin: 15px 0;
            color: #000;
        }
        .divLine {
            border: 0;
            height: 1px;
            background-color: #ccc;
            width: 100%;
            margin: 0 0 40px 0;
        }
        .id {
            display: flex;
            align-items: center;
            background-color: #F8F9F5;
            border: 1px solid #F0F0F0;
            border-radius: 12px;
            padding: 10px 20px;
            margin-bottom: 15px;
            text-align: left;
            margin-top: 85px;
        }

        .pwd{
            display: flex;
            align-items: center;
            background-color: #F8F9F5;
            border: 1px solid #F0F0F0;
            border-radius: 12px;
            padding: 10px 20px;
            margin-bottom: 15px;
            text-align: left;
            margin-top: 30px;
        }
        .textId, .textPwd {
            width: 70px;
            font-weight: bold;
            font-size: 14px;
        }
        .div {
            flex: 1;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            padding: 8px 12px;
            outline: none;
            background-color: #fff;
        }
        .loginForm {
            width: 90%;
            max-width: 450px;
            text-align: center;
            margin: 0 auto;
        }
        .buttonL {
            background-color: #426B1F;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
            transition: background 0.3s;
            margin-top: 30px;
        }
        .buttonL:hover {
            background-color: #3d5124;
        }
        .errorMsg {
            color: red;
            font-size: 13px;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
<main class="login">
	
    <header class="banner">
        <span class="textBan">UNIVOL</span>
    </header>
    <section class="subject">
        <h1 class="textSub">로그인</h1>
    </section>
    <hr class="divLine"/>

    <!-- 로그인 실패 시 에러 메시지 -->
    <p class="errorMsg" th:if="${error}" th:text="${error}"></p>

    <form class="loginForm" th:action="@{/logIn}" method="post">
        <div class="id">
            <label class="textId" for="userId">아이디</label>
            <input class="div" type="text" id="userId"
                   name="userId" placeholder="ID"/>
        </div>
        <div class="pwd">
            <label class="textPwd" for="userPw">비밀번호</label>
            <input class="div" type="password" id="userPw"
                   name="userPw" placeholder="PWD"/>
        </div>
        <button class="buttonL" type="submit">
            <span>로그인</span>
        </button>
        <button class="buttonL" type="button"
                onclick="location.href='/join'">
            <span>회원가입</span>
        </button>
    </form>
</main>
</body>
</html>
