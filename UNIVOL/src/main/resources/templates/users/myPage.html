<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNIVOL - 마이페이지</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
    body { background: #f5f5f0; min-height: 100vh; }
    .header {
      background: #fff;
      border-bottom: 1px solid #e0e0d8;
      padding: 0 2rem;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      height: 58px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo { font-size: 22px; font-weight: 800; color: #426B1F; letter-spacing: 2px; cursor: pointer; }
    .nav { display: flex; gap: 24px; justify-content: center; }
    .nav a { font-size: 14px; color: #444; text-decoration: none; padding: 4px 0; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
    .nav a.active, .nav a:hover { color: #426B1F; border-bottom-color: #426B1F; }
    .header-right { display: flex; align-items: center; gap: 10px; justify-content: flex-end; }
    .username { font-size: 14px; color: #666; margin-right: 4px; }
    .header-btn { font-size: 13px; padding: 6px 14px; border-radius: 8px; border: 1px solid #426B1F; cursor: pointer; text-decoration: none; transition: background 0.15s, color 0.15s; }
    .btn-admin { background: #426B1F; color: #fff; }
    .btn-admin:hover { background: #355818; }
    .btn-outline { background: transparent; color: #426B1F; }
    .btn-outline:hover { background: #eaf3de; }
    .container { max-width: 1200px; margin: 2.5rem auto; padding: 0 3rem; }
    .page-title { font-size: 22px; font-weight: 700; color: #222; margin-bottom: 1.5rem; }
    .card { background: #fff; border: 1px solid #e0e0d8; border-radius: 12px; overflow: hidden; }
    .card-header { padding: 1.1rem 1.5rem; border-bottom: 1px solid #e0e0d8; }
    .card-header h2 { font-size: 16px; font-weight: 700; color: #222; }
    .card-header p { font-size: 13px; color: #888; margin-top: 3px; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #f7f7f2; border-bottom: 1px solid #e0e0d8; }
    thead th { padding: 10px 16px; font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.05em; text-align: center; }
    thead th:nth-child(2) { text-align: left; }
    tbody tr { border-bottom: 1px solid #f0f0ea; cursor: pointer; transition: background 0.12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f7faf5; }
    tbody td { padding: 14px 16px; font-size: 14px; color: #444; text-align: center; }
    tbody td:nth-child(2) { text-align: left; color: #222; }
    .empty { padding: 3rem; text-align: center; color: #bbb; font-size: 14px; }
  </style>
</head>
<body>
<div th:replace="common/navbar.html"></div>

<main class="container">
  <h1 class="page-title">마이페이지</h1>

  <div class="card">
    <div class="card-header">
      <h2>신청현황</h2>
      <p th:text="${session.loginUser.userName} + '님이 신청한 봉사 목록'"></p>
    </div>

    <table>
      <thead>
        <tr>
          <th style="width: 90px;">글번호</th>
          <th>제목</th>
          <th style="width: 120px;">작성자</th>
          <th style="width: 100px;">신청일</th>
        </tr>
      </thead>
      <tbody>
	  <tbody>
		 <tr th:each="apply : ${applyList}"
		    th:onclick="|location.href='/posts/' + ${apply['P_NUMBER']}|">
		  <td th:text="'#' + ${apply['P_NUMBER']}"></td>
		  <td th:text="${apply['P_TITLE']}"></td>
		  <td th:text="${apply['USER_NAME']}"></td>
		  <td th:text="${apply['C_DATE']}"></td>
		</tr>
     </tbody>
    </table>
  </div>
</main>

<!-- 세션 체크: 로그인 안 되어 있으면 로그인 페이지로 이동 -->
 <script th:inline="javascript">
  window.onload = () => {
    const loginUser = /*[[${session.loginUser}]]*/ null;
    if (loginUser == null) {
      alert('로그인 후 이용하세요.');
      location.href = '/login';
    }
  };
  
</script> 
</body>
</html>
