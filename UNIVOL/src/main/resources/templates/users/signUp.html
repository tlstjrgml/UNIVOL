<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>회원가입 - UNIVOL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@500&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #f4f6f1, #e9f0e1);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }

    .container {
        width: 100%;
        max-width: 480px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        padding: 40px;
    }

    .logo {
        font-family: 'Newsreader', serif;
        font-size: 32px;
        color: #426B1F;
        letter-spacing: 3px;
        text-align: center;
        margin-bottom: 8px;
    }

    h2 {
        text-align: center;
        font-size: 18px;
        font-weight: 500;
        color: #555;
        margin-bottom: 28px;
    }

    .divider {
        border: none;
        height: 1px;
        background: #e0e0d8;
        margin-bottom: 28px;
    }

    .form-group {
        margin-bottom: 16px;
    }

    label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #444;
        margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"],
    input[type="number"],
    input[type="date"],
    input[type="tel"] {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        color: #333;
        background: #fafafa;
        transition: border-color 0.2s;
        outline: none;
    }

    input:focus {
        border-color: #426B1F;
        background: #fff;
    }

    .gender-group {
        display: flex;
        gap: 12px;
        margin-top: 4px;
    }

    .gender-group input[type="radio"] {
        display: none;
    }

    .gender-group label {
        flex: 1;
        text-align: center;
        padding: 10px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        color: #888;
        cursor: pointer;
        transition: all 0.2s;
    }

    .gender-group input[type="radio"]:checked + label {
        border-color: #426B1F;
        background-color: #eaf3de;
        color: #426B1F;
        font-weight: 700;
    }

    .gender-group label:hover {
        border-color: #426B1F;
        color: #426B1F;
    }

    button[type="submit"] {
        width: 100%;
        padding: 13px;
        margin-top: 24px;
        background-color: #426B1F;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        letter-spacing: 1px;
    }

    button[type="submit"]:hover {
        background-color: #355818;
    }

    .login-link {
        text-align: center;
        margin-top: 16px;
        font-size: 13px;
        color: #888;
    }

    .login-link a {
        color: #426B1F;
        text-decoration: none;
        font-weight: 600;
    }

    .login-link a:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

<div class="container">
    <div class="logo">UNIVOL</div>
    <h2>회원가입</h2>
    <hr class="divider">

    <form th:action="@{/signUp}" method="post" onsubmit="return validatePw()">

        <div class="form-group">
            <label for="userId">아이디</label>
            <input type="text" id="userId" name="userId"
                   placeholder="아이디를 입력하세요" required>
            <label id="idCheckResult">Please check your ID.</label>
        </div>

        <div class="form-group">
            <label for="userPw">비밀번호</label>
            <input type="password" id="userPw" name="userPw"
                   placeholder="비밀번호를 입력하세요" required>
        </div>

        <div class="form-group">
            <label for="userPwCheck">비밀번호 확인</label>
            <input type="password" id="userPwCheck"
                   placeholder="비밀번호를 다시 입력하세요" required>
                   
        </div>

        <div class="form-group">
            <label for="userName">이름</label>
            <input type="text" id="userName" name="userName"
                   placeholder="이름을 입력하세요">
        </div>

        <div class="form-group">
            <label for="birth">생년월일</label>
            <input type="date" id="birth" name="birth">
        </div>

        <div class="form-group">
            <label>성별</label>
            <div class="gender-group">
                <input type="radio" id="male" name="gender" value="M">
                <label for="male">남자</label>
                <input type="radio" id="female" name="gender" value="F">
                <label for="female">여자</label>
            </div>
        </div>

        <div class="form-group">
            <label for="phone">전화번호</label>
            <input type="tel" id="phone" name="phone"
                   placeholder="010-0000-0000">
        </div>

        <div class="form-group">
            <label for="address">주소</label>
            <input type="text" id="address" name="address"
                   placeholder="주소를 입력하세요">
        </div>

        <button type="submit">회원가입</button>

        <div class="login-link">
            이미 계정이 있으신가요? <a th:href="@{/logIn}">로그인</a>
        </div>

    </form>
</div>

	<script th:inline="javascript">
	
		
		window.onload = () => {
		    document.getElementById('userId').addEventListener('change', e => {
		        checkValue(e.target);
		    });
		}
		
		let idCheck = false;
		
		const checkValue = obj => {
			const resultLabel = document.getElementById('idCheckResult');
		    if (obj.value.trim() == '') {
		        resultLabel.style.color = 'black';
		        resultLabel.innerText = 'Please check your ID.';
		        idCheck = false;
		    } else {
		        $.ajax({
		            url: '/checkValue',
		            data: { column: obj.id, value: obj.value.trim() },
		            success: data => {
		                if (data == 0) {
		                    resultLabel.innerText = 'You can use this ' + obj.id + '.';
		                    resultLabel.style.color = 'green';
		                    idCheck = true;
		                } else {
		                    resultLabel.innerText = "You can't use this " + obj.id + '.';
		                    resultLabel.style.color = 'red';
		                    idCheck = false;
		                }
		            },
		            error: data => console.log(data)
		        });
		    }
		}
		
		function validatePw() {
		    const pw = document.getElementById('userPw').value;
		    const pwCheck = document.getElementById('userPwCheck').value;
	    
		    if (pw !== pwCheck) {
		        alert('비밀번호가 일치하지 않습니다.');
		        document.getElementById('userPwCheck').focus();
		        return false;
		    }
		    
		    if (!idCheck) {
		        alert('아이디 중복 확인을 해주세요.');
		        document.getElementById('userId').focus();
		        return false;
		    }
		    return true;
		}
		

	
	</script>
	
	

</body>
</html>
