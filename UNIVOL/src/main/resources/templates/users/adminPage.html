<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <title>UNIVOL 관리자 페이지</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background-color: #f5f5f5; color: #222; padding: 30px; }

    /* 공통 레이아웃 */
    .container { width: 1000px; margin: 0 auto; }
    .logo { font-family: 'Playfair Display', serif; font-size: 40px; color: #424B1F; letter-spacing: 2px; text-align: center; margin-bottom: 10px; }
    .page-title { font-size: 20px; font-weight: bold; text-align: center; margin-bottom: 10px; }
    .divider { border: none; border-top: 1px solid #ccc; margin: 10px 0 20px 0; }

    /* 카드 */
    .card { background-color: #fff; border: 1px solid #ccc; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; }

    /* 테이블 */
    table { width: 100%; border-collapse: collapse; }
    th { background: #f0f0f0; width: 140px; }
    th, td { border: 1px solid #ddd; padding: 12px; text-align: left; font-size: 14px; }

    /* 버튼 공통 */
    button { padding: 8px 15px; cursor: pointer; border-radius: 10px; background-color: #424B1F; color: white; border: none; }
    button:hover { background-color: #2f3616; }
    .button-group { display: flex; gap: 8px; }
    .btn { background-color: #888; }
    .btn-area { text-align: right; margin-top: 20px; }

    /* 페이지네이션 */
    .pagination { display: flex; justify-content: center; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">

    <!-- 페이지 헤더 -->
    <div class="logo">UNIVOL</div>
    <div class="page-title">관리자 페이지</div>
    <hr class="divider">

    <!-- 회원 목록 -->
    <div class="card">
      <button type="button" id="MemberToggleBtn">회원 목록 펼치기 ▼</button>
      <table id="memberTable">
        <thead>
          <tr>
            <th>아이디</th>
            <th>이름</th>
            <th>전화번호</th>
            <th>성별</th>
            <th>관리자여부</th>
            <th>회원 상태 변경</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="m : ${mlist}" data-userid="${m.userId}">
            <td th:text="${m.userId}"></td>
            <td th:text="${m.userName}"></td>
            <td th:text="${m.phone}"></td>
            <td th:text="${m.gender}"></td>
            <!-- 관리자 여부 버튼 -->
            <td>
              <div th:if="${m.isAdmin == 'Y'}" class="button-group">
                <button type="button" class="btn admin-btn" style="background-color:#424B1F;">관리</button>
                <button type="button" class="btn normal-btn" style="background-color:#888;">일반</button>
              </div>
              <div th:if="${m.isAdmin == 'N'}" class="button-group">
                <button type="button" class="btn admin-btn" style="background-color:#888;">관리</button>
                <button type="button" class="btn normal-btn" style="background-color:#424B1F;">일반</button>
              </div>
            </td>
            <!-- 회원 활동/정지 버튼 -->
            <td>
              <div th:if="${m.memberStatus == 'Y'}" class="button-group">
                <button type="button" class="btn active-btn" style="background-color:blue;">활동</button>
                <button type="button" class="btn ban-btn" style="background-color:#888;">정지</button>
              </div>
              <div th:if="${m.memberStatus == 'N'}" class="button-group">
                <button type="button" class="btn active-btn" style="background-color:#888;">활동</button>
                <button type="button" class="btn ban-btn" style="background-color:red;">정지</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
      <!-- 회원 페이지네이션 -->
      <div class="pagination">
        <th:block th:each="n:${#numbers.sequence(memberPi.startPage, memberPi.endPage)}">
          <form th:id="'memberPageForm-' + ${n}" action="/adminPage" method="get" style="display:none;">
            <input type="hidden" name="memberPage" th:value="${n}">
          </form>
          <button type="button" class="page-btn"
                  th:text="${n}"
                  th:classappend="${n == memberPi.currentPage} ? 'active' : ''"
                  th:onClick="'goToMemberPage(' + ${n} + ')'">
          </button>
        </th:block>
      </div>
    </div>

    <!-- 게시글 목록 -->
    <div class="card">
      <button type="button" id="PostToggleBtn">게시글 목록 펼치기 ▼</button>
      <table id="postTable">
        <thead>
          <tr>
            <th>글번호</th>
            <th>아이디</th>
            <th>내용</th>
            <th>조회수</th>
            <th>좋아요 수</th>
            <th>상태</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="p : ${plist}">
            <td th:text="${p.pNumber}"></td>
            <td th:text="${p.userId}"></td>
            <td th:text="${p.contents}"></td>
            <td th:text="${p.views}"></td>
            <td th:text="${p.likeCount}"></td>
            <!-- 게시글 활성/삭제 버튼 -->
            <td>
              <div th:if="${p.pStatus.toString() == 'Y'}">
                <button type="button" class="btn rollback-btn" style="background-color:blue;">Y</button>
                <button type="button" class="btn delete-btn" style="background-color:#888;">N</button>
              </div>
              <div th:if="${p.pStatus.toString() == 'N'}">
                <button type="button" class="btn rollback-btn" style="background-color:#888;">Y</button>
                <button type="button" class="btn delete-btn" style="background-color:red;">N</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
      <!-- 게시글 페이지네이션 -->
      <div class="pagination">
        <th:block th:each="n:${#numbers.sequence(postPi.startPage, postPi.endPage)}">
          <form th:id="'postPageForm-' + ${n}" action="/adminPage" method="get" style="display:none;">
            <input type="hidden" name="postPage" th:value="${n}">
          </form>
          <button type="button" class="page-btn"
                  th:text="${n}"
                  th:classappend="${n == postPi.currentPage} ? 'active' : ''"
                  th:onClick="'goToPostPage(' + ${n} + ')'">
          </button>
        </th:block>
      </div>
    </div>

    <!-- 댓글 목록 -->
    <div class="card">
      <button type="button" id="ReplyToggleBtn">댓글 목록 펼치기 ▼</button>
      <table id="replyTable">
        <thead>
          <tr>
            <th>댓글 번호</th>
            <th>아이디</th>
            <th>내용</th>
            <th>상태</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="r : ${replyList}">
            <td th:text="${r.cNumber}"></td>
            <td th:text="${r.userId}"></td>
            <td th:text="${r.comments}"></td>
            <!-- 댓글 활성/삭제 버튼 -->
            <td>
              <div th:if="${r.cStatus == 'Y'}">
                <button type="button" class="btn replyrollback-btn" style="background-color:blue;">Y</button>
                <button type="button" class="btn replydelete-btn" style="background-color:#888;">N</button>
              </div>
              <div th:if="${r.cStatus == 'N'}">
                <button type="button" class="btn replyrollback-btn" style="background-color:#888;">Y</button>
                <button type="button" class="btn replydelete-btn" style="background-color:red;">N</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
      <!-- 댓글 페이지네이션 -->
      <div class="pagination">
        <th:block th:each="n:${#numbers.sequence(replyPi.startPage, replyPi.endPage)}">
          <form th:id="'replyPageForm-' + ${n}" action="/adminPage" method="get" style="display:none;">
            <input type="hidden" name="replyPage" th:value="${n}">
          </form>
          <button type="button" class="page-btn"
                  th:text="${n}"
                  th:classappend="${n == replyPi.currentPage} ? 'active' : ''"
                  th:onClick="'goToReplyPage(' + ${n} + ')'">
          </button>
        </th:block>
      </div>
    </div>

  </div>

  <script>
    /* 관리자 여부 변경 */
    document.querySelectorAll(".admin-btn").forEach(function(btn) {
      btn.addEventListener('click', function() {
        const tr = this.parentElement.parentElement.parentElement;
        const userId = tr.querySelector('td').innerText;
        $.ajax({
          url: '/toAdminMember',
          type: 'post',
          data: { userId: userId },
          success: function() {
            btn.style.backgroundColor = "#424B1F";
            btn.nextElementSibling.style.backgroundColor = "#888";
          }
        });
      });
    });

    document.querySelectorAll(".normal-btn").forEach(function(btn) {
      btn.addEventListener('click', function() {
        const tr = this.parentElement.parentElement.parentElement;
        const userId = tr.querySelector('td').innerText;
        $.ajax({
          url: '/toNormalMember',
          type: 'post',
          data: { userId: userId },
          success: function() {
            btn.style.backgroundColor = "#424B1F";
            btn.previousElementSibling.style.backgroundColor = "#888";
          }
        });
      });
    });

    /* 회원 활동/정지 변경 */
    document.querySelectorAll(".ban-btn").forEach(function(btn) {
      btn.addEventListener('click', function() {
        const tr = this.parentElement.parentElement.parentElement;
        const userId = tr.querySelector('td').innerText;
        $.ajax({
          url: '/banMember',
          type: 'post',
          data: { userId: userId },
          success: function() {
            btn.style.backgroundColor = "red";
            btn.previousElementSibling.style.backgroundColor = "#888";
          }
        });
      });
    });

    document.querySelectorAll(".active-btn").forEach(function(btn) {
      btn.addEventListener('click', function() {
        const tr = this.parentElement.parentElement.parentElement;
        const userId = tr.querySelector('td').innerText;
        $.ajax({
          url: '/activeMember',
          type: 'post',
          data: { userId: userId },
          success: function() {
            btn.style.backgroundColor = "blue";
            btn.nextElementSibling.style.backgroundColor = "#888";
          }
        });
      });
    });

    /* 게시글 삭제 */
    document.querySelectorAll(".delete-btn").forEach(function(btn) {
      btn.addEventListener('click', function() {
        const tr = this.parentElement.parentElement.parentElement;
        const pNumber = tr.querySelector('td').innerText;
        $.ajax({
          url: '/deletePost',
          type: 'post',
          data: { pNumber: pNumber },
          success: function() {
            btn.style.backgroundColor = "red";
            btn.previousElementSibling.style.backgroundColor = "#888";
          }
        });
      });
    });

    /* 게시글 복구 */
    document.querySelectorAll(".rollback-btn").forEach(function(btn) {
      btn.addEventListener('click', function() {
        const tr = this.parentElement.parentElement.parentElement;
        const pNumber = tr.querySelector('td').innerText;
        $.ajax({
          url: '/rollbackPost',
          type: 'post',
          data: { pNumber: pNumber },
          success: function() {
            btn.style.backgroundColor = "blue";
            btn.nextElementSibling.style.backgroundColor = "#888";
          }
        });
      });
    });

    /* 댓글 삭제 */
    document.querySelectorAll(".replydelete-btn").forEach(function(btn) {
      btn.addEventListener('click', function() {
        const tr = this.parentElement.parentElement.parentElement;
        const rNumber = tr.querySelector('td').innerText;
        $.ajax({
          url: '/adminDeleteReply',
          type: 'post',
          data: { rNumber: rNumber },
          success: function() {
            btn.style.backgroundColor = "red";
            btn.previousElementSibling.style.backgroundColor = "#888";
          }
        });
      });
    });

    /* 댓글 복구 */
    document.querySelectorAll(".replyrollback-btn").forEach(function(btn) {
      btn.addEventListener('click', function() {
        const tr = this.parentElement.parentElement.parentElement;
        const rNumber = tr.querySelector('td').innerText;
        $.ajax({
          url: '/adminRollbackReply',
          type: 'post',
          data: { rNumber: rNumber },
          success: function() {
            btn.style.backgroundColor = "blue";
            btn.nextElementSibling.style.backgroundColor = "#888";
          }
        });
      });
    });

    /* 회원 목록 토글 */
    $('#MemberToggleBtn').on('click', function() {
      $('#memberTable').slideToggle();
    });

    /* 게시글 목록 토글 */
    $('#PostToggleBtn').on('click', function() {
      $('#postTable').slideToggle();
    });

    /* 댓글 목록 토글 */
    $('#ReplyToggleBtn').on('click', function() {
      $('#replyTable').slideToggle();
    });

    /* 페이지네이션 */
    function goToMemberPage(pageNum) {
      document.getElementById('memberPageForm-' + pageNum).submit();
    }

    function goToPostPage(pageNum) {
      document.getElementById('postPageForm-' + pageNum).submit();
    }

    function goToReplyPage(pageNum) {
      document.getElementById('replyPageForm-' + pageNum).submit();
    }
  </script>

</body>
</html>
