<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <title>UNIVOL 관리자 페이지</title>
	
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>
       

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #222222;
            padding: 30px;
        }

        .container {
            width: 1000px;
            margin: 0 auto;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 40px;
            color:  #424B1F;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 10px;
        }

        .page-title {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }

        .divider {
            border: none;
            border-top: 1px solid #cccccc;
            margin: 10px 0 20px 0;
        }

        .card {
            background-color: #ffffff;
            border: 1px solid #cccccc;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f0f0f0;
            width: 140px;
        }

        th, td {
            border: 1px solid #dddddd;
            padding: 12px;
            text-align: left;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 8px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 10px;
            background-color:  #424B1F;
            color: white;
            border: none;
        }

        button:hover {
            background-color: #2f3616;
        }

        .btn {
            background-color: #888888;
        }
        
        

        .ban-btn:hover {
            background-color: #666666;
        }

        .btn-area {
            text-align: right;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">UNIVOL</div>
        <div class="page-title">관리자 페이지</div>
        <hr class="divider">

        <div class="card">
        	<button type="button" id="MemberToggleBtn">회원 목록 펼치기 ▼</button>
        	
            <table id="memberTable">
                <thead>
                    <tr>
                        <th>아이디</th>
                        <th>이름</th>
                        <th>전화번호</th>
                        <th>성별</th>
                        <th>관리자여부</th>
                        <th>회원 상태 변경</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${mlist}" data-userid = "${m.userId}">
                        <td th:text="${m.userId}"></td>
                        <td th:text="${m.userName}"></td>
                        <td th:text="${m.phone}"></td>
                        <td th:text="${m.gender}"></td>
                        <td>
                        	<div th:if="${m.isAdmin == 'Y'}" class="button-goup">
                        		<button  type="button" class="btn admin-btn" style="background-color:#424B1F;">관리</button>
       							<button type="button" class="btn normal-btn" style="background-color:#888888;">일반</button>
                        	</div>
                        	<div th:if="${m.isAdmin == 'N'}" class="button-goup">
                        		<button  type="button" class="btn admin-btn" style="background-color:#888888;">관리</button>
       							<button type="button" class="btn normal-btn" style="background-color:#424B1F;">일반</button>
                        	</div>
                        </td>	
                        <td>
                            <div th:if="${m.memberStatus == 'Y'}" class="button-group">
                                <button type="button" class="btn active-btn" style="background-color:blue;">활동</button>
                                <button type="button" class="btn ban-btn" style="background-color:#888888;">정지</button>
                            </div>
                            <div th:if="${m.memberStatus == 'N'}"class="button-group">
                                <button type="button" class="btn active-btn" style="background-color:#888888;">활동</button>
                                <button type="button" class="btn ban-btn" style="background-color:red;">정지</button>
                            </div>
                        </td>
                    </tr>
                   
                </tbody>
            </table>
        </div>
        
        <!-- 전체 게시글 조회 -->
         <div class="card">
        	<button type="button" id="PostToggleBtn">게시글 목록 펼치기 ▼</button>
        	
            <table id="postTable">
                <thead>
                    <tr>
                    	<th>글번호</th>
                        <th>아이디</th>
                        <th>내용</th>
                        <th>조회수</th>
                        <th>좋아요 수 </th>
                        <th>상태</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p: ${plist}">
                        <td th:text="${p.pNumber}"></td>
                        <td th:text="${p.userId}"></td>
                        <td th:text="${p.contents}"></td>
                        <td th:text="${p.views}"></td>
                        <td th:text="${p.likes}"></td>
                        <td>
                        	<div th:if="${p.pStatus.toString() == 'Y'}">
	                        	<button type="button" class="btn rollback-btn" style="background-color:blue; color:white;">Y</button>
	                        	<button type="button" class="btn delete-btn" style="background-color:#888888; color:white;">N</button>
                        	</div>
                        	<div th:if = "${p.pStatus.toString() == 'N'}">
                        		<button type="button" class = "btn rollback-btn" style="background-color:#888888; color:white">Y</button>
                        		<button type="button" class="btn delete-btn" style="background-color:red; color:white;">N</button>
                        	</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- 전체 댓글 조회 -->
        <div class="card">
        	<button type="button" id="ReplyToggleBtn">댓글 목록 펼치기 ▼</button>
        	
        	<table id="replyTable">
        		<thead>
        			<tr>
        				<th>댓글 번호</th>
        				<th>아이디</th>
        				<th>내용</th>
        				<th>상태</th>
        			</tr>
        		</thead>
        		<tbody>
        			<tr th:each="r:${rlist}">
        				<td th:text="${수정하기}"></td>
        				<td th:text="${수정하기}"></td>
        				<td th:text="${수정하기}"></td>
        				<td>
        					<div th:if="${}">
        						<button type="button" class="btn replyrollback-btn" style="background-color:blue; color: white;">Y</button>
        						<button type="button" class="btn replydelete-btn" style="background-color:#888888; color: white">N</button>
        					</div>
        					<div th:if="${}">
        						<button type="button" class="btn replyrollback-btn" style="background-color:#888888; color:white;">Y</button>
        						<button type="button" class="btn replydelete-btn" style="background-color:red; color:white">N</button>
        					</div>
        				</td>
        			</tr>
        		</tbody>
        	</table>
        </div>

    <script>
    
	    /* 관리자여부 변경 */
	    document.querySelectorAll(".admin-btn").forEach(function(btn){
	        btn.addEventListener('click', function(){
	            const tr = this.parentElement.parentElement.parentElement;
	            const userId = tr.querySelector('td').innerText;
	            $.ajax({
	                url:'/toAdminMember',
	                type:'post',
	                data:{userId:userId},
	                success: function(result){
	                    btn.style.backgroundColor = "#424B1F";
	                    btn.nextElementSibling.style.backgroundColor = "#888888";
	                }
	            });
	        });
	    });
	
	    document.querySelectorAll(".normal-btn").forEach(function(btn){
	        btn.addEventListener('click', function(){
	            const tr = this.parentElement.parentElement.parentElement;
	            const userId = tr.querySelector('td').innerText;
	            $.ajax({
	                url:'/toNormalMember',
	                type:'post',
	                data:{userId:userId},
	                success: function(result){
	                    btn.style.backgroundColor = "#424B1F";
	                    btn.previousElementSibling.style.backgroundColor = "#888888";
	                }
	            });
	        });
	    });
	
	    /* 활동상태변경 */
	    document.querySelectorAll(".ban-btn").forEach(function(btn){
	        btn.addEventListener('click', function(){
	            const tr = this.parentElement.parentElement.parentElement;
	            const userId = tr.querySelector('td').innerText;
	            $.ajax({
	                url:'/banMember',
	                type:'post',
	                data:{userId:userId},
	                success: function(result){
	                    btn.style.backgroundColor = "red";
	                    btn.previousElementSibling.style.backgroundColor = "#888888";
	                }
	            });
	        });
	    });
	
	    document.querySelectorAll(".active-btn").forEach(function(btn){
	        btn.addEventListener('click', function(){
	            const tr = this.parentElement.parentElement.parentElement;
	            const userId = tr.querySelector('td').innerText;
	            $.ajax({
	                url:'/activeMember',
	                type:'post',
	                data:{userId:userId},
	                success: function(result){
	                    btn.style.backgroundColor = "blue";
	                    btn.nextElementSibling.style.backgroundColor = "#888888";
	                }
	            });
	        });
	    });
    
	    
    	/* 글 삭제 */
    	document.querySelectorAll(".delete-btn").forEach(function(btn){
			btn.addEventListener('click', function(){
				const tr = this.parentElement.parentElement.parentElement;
				const pNumber = tr.querySelector('td').innerText;
				
				$.ajax({
					url:'/deletePost',
					type:'post',
					data:{pNumber:pNumber},
					success: function(result){
						btn.style.backgroundColor = "red";
						btn.previousElementSibling.style.backgroundColor = "#888888";
					}
				});
			});
    	});
    	
    	/* 글 복구 */
 	    document.querySelectorAll(".rollback-btn").forEach(function(btn){
			btn.addEventListener('click', function(){
				const tr = this.parentElement.parentElement.parentElement;
				const pNumber = tr.querySelector('td').innerText;
				
				$.ajax({
					url:'/rollbackPost',
					type:'post',
					data:{pNumber:pNumber},
					success: function(result){
						btn.style.backgroundColor = "blue";
						btn.nextElementSibling.style.backgroundColor = "#888888";
					}
				});
			});
	   	});
    	
    	/* 댓글 삭제 */
    	document.querySelectorAll(".replydelete-btn").forEach(function(btn){
			btn.addEventListener('click',function(){
				const tr = this.parentElement.parentElement.parentElement;
				const rNumber = tr.querySelector('td').innerText;
				
				$.ajax({
					url: '/deleteReply',
					type:'post',
					data:{rNumber:rNumber},
					success:function(result){
						btn.style.backgroundColor = "red";
						btn.nextElementSibling.style.backgroundColor = "#888888";
					}
				});
			});
	    });
    	/* 댓글 복구 */
    	document.querySelectorAll(".replyrollback-btn").forEach(function(btn){
			btn.addEventListener('click', function(){
				const tr = this.parentElement.parentElement.parentElement;
				const rNumber = tr.querySelector('td').innerText;
				
				$.ajax({
					url: '/rollbackReply',
					type:'post',
					data:{rNumber:rNumber},
					success:function(result){
						btn.style.backgroundColor = "blue";
						btn.previousElementSibling.style.backgroundColor = "#888888"
					}
				});
			});
    	});
    	$('#MemberToggleBtn').on('click', function(){
    	    $('#memberTable').slideToggle();
    	});
    	
    	$('#PostToggleBtn').on('click', function(){
			$('#postTable').slideToggle();
    	});
    	
    	$('#ReplyToggleBtn').on('click',function(){
			$('#replyTable').slideToggle();
    	});
    </script>
</body>
</html>
