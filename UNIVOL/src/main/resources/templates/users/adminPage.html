<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIVOL 관리자 페이지</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>
       

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #222222;
            padding: 30px;
        }

        .container {
            width: 1000px;
            margin: 0 auto;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 40px;
            color:  #424B1F;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 10px;
        }

        .page-title {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }

        .divider {
            border: none;
            border-top: 1px solid #cccccc;
            margin: 10px 0 20px 0;
        }

        .card {
            background-color: #ffffff;
            border: 1px solid #cccccc;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f0f0f0;
            width: 140px;
        }

        th, td {
            border: 1px solid #dddddd;
            padding: 12px;
            text-align: left;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 8px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 10px;
            background-color:  #424B1F;
            color: white;
            border: none;
        }

        button:hover {
            background-color: #2f3616;
        }

        .btn {
            background-color: #888888;
        }
        
        

        .ban-btn:hover {
            background-color: #666666;
        }

        .btn-area {
            text-align: right;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">UNIVOL</div>
        <div class="page-title">관리자 페이지</div>
        <hr class="divider">

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>아이디</th>
                        <th>이름</th>
                        <th>전화번호</th>
                        <th>성별</th>
                        <th>관리자여부</th>
                        <th>회원 상태 변경</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${mlist}">
                        <td th:text="${m.userId}"></td>
                        <td th:text="${m.userName}"></td>
                        <td th:text="${m.phone}"></td>
                        <td th:text="${m.gender}"></td>
                        <td th:text="${m.isAdmin}"></td>
                        <td>
                            <div class="button-group">
                                <button type="button" class="btn">활동</button>
                                <button type="button" class="btn">정지</button>
                            </div>
                        </td>
                    </tr>
                   
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.querySelectorAll(".active-btn").forEach(btn => {
            btn.addEventListener("click", function() {
                alert("회원 상태를 활동으로 변경했습니다");
                
            });
        });

        document.querySelectorAll(".ban-btn").forEach(btn => {
            btn.addEventListener("click", function() {
                alert("회원 상태를 정지로 변경했습니다");
            });
        });
    </script>
</body>
</html>
