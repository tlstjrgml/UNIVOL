<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIVOL - 오류</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            color: #424B1F;
            letter-spacing: 2px;
            margin-bottom: 2rem;
        }
        .card {
            background: white;
            border: 1px solid #cccccc;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 40px 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .title {
            font-size: 18px;
            font-weight: bold;
            color: #222;
            margin-bottom: 16px;
        }
        .message {
            font-size: 14px;
            color: #888;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 10px 24px;
            background: #424B1F;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
        }
        .btn:hover { background: #2f3616; }
    </style>
</head>
<body>
    <div class="logo">UNIVOL</div>
    <div class="card">
        <div class="title">서버 오류가 발생했습니다</div>
        <div class="message" th:text="${message}">오류 메시지가 여기에 표시됩니다</div>
        <a href="/" class="btn">홈으로 돌아가기</a>
    </div>
</body>
</html>
