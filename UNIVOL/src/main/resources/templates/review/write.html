<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>후기 작성 - UNIVOL</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
    body { background: #f5f5f0; min-height: 100vh; }

    /* 전체 레이아웃 */
    .unv-wrap { padding: 2.5rem 2rem; }
    .unv-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
      align-items: start;
    }

    /* 폼 카드 */
    .unv-card {
      background: #fff;
      border-radius: 12px;
      border: 0.5px solid #ddd;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07);
      padding: 40px 44px;
    }
    .unv-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 24px;
    }
    .unv-field { margin-bottom: 24px; }
    .unv-field.full { grid-column: 1 / -1; }

    /* 폼 요소 */
    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: #426B1F;
      margin-bottom: 8px;
    }
    input[type="text"],
    textarea {
      width: 100%;
      padding: 13px 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      font-family: 'Noto Sans KR', sans-serif;
      color: #222;
      background: #fafaf7;
      outline: none;
      transition: border 0.15s;
    }
    input[type="text"]:focus,
    textarea:focus {
      border-color: #426B1F;
      background: #fff;
    }
    textarea { resize: none; }

    /* 버튼 */
    .unv-btn-group {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 10px;
    }
    button {
      padding: 12px 40px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary { background: #426B1F; color: #fff; }
    .btn-primary:hover { background: #2f3616; }
    .btn-secondary { background: #e8e8e3; color: #555; }
    .btn-secondary:hover { background: #d5d5ce; }

    /* 작성 가이드 패널 */
    .unv-guide {
      background: #fff;
      border-radius: 12px;
      border: 0.5px solid #ddd;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07);
      padding: 30px 26px;
    }
    .unv-guide-title {
      font-size: 15px;
      font-weight: 700;
      color: #426B1F;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 2px solid #426B1F;
    }
    .unv-guide-section { margin-bottom: 22px; }
    .unv-guide-section-title {
      font-size: 13px;
      font-weight: 700;
      color: #426B1F;
      margin-bottom: 10px;
    }
    .unv-guide-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 10px;
    }
    .unv-guide-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #426B1F;
      margin-top: 6px;
      flex-shrink: 0;
    }
    .unv-guide-text { font-size: 13px; color: #555; line-height: 1.7; }
    .unv-guide-notice {
      background: #f5f5f0;
      border-radius: 8px;
      padding: 16px 18px;
      margin-top: 4px;
    }
    .unv-guide-notice p { font-size: 12px; color: #777; line-height: 1.8; margin: 0; }
    .unv-guide-notice strong { color: #426B1F; font-weight: 700; }
  </style>
</head>
<body>

  <!-- 네비게이션 바 -->
  <div th:replace="~{common/navbar.html}"></div>

  <!-- 본문 레이아웃 -->
  <div class="unv-wrap">
    <div class="unv-layout">

      <!-- 작성 폼 -->
      <div class="unv-card">
        <form th:action="@{/review/insert}" method="POST">
          <div class="unv-row">

            <!-- 제목 -->
            <div class="unv-field full">
              <label for="rTitle">제목</label>
              <input type="text" id="rTitle" name="rTitle" placeholder="제목을 입력하세요" required>
            </div>

            <!-- 내용 -->
            <div class="unv-field full">
              <label for="rContents">내용</label>
              <textarea id="rContents" name="rContents" rows="13" placeholder="내용을 입력하세요" required></textarea>
            </div>

          </div>

          <!-- 등록/취소 버튼 -->
          <div class="unv-btn-group">
            <button type="submit" class="btn-primary">완료</button>
            <button type="button" class="btn-secondary" onclick="history.back()">취소</button>
          </div>
        </form>
      </div>

      <!-- 작성 가이드 패널 -->
      <div class="unv-guide">
        <div class="unv-guide-title">작성 가이드</div>

        <div class="unv-guide-section">
          <div class="unv-guide-section-title">제목 작성 시</div>
          <div class="unv-guide-item">
            <div class="unv-guide-dot"></div>
            <div class="unv-guide-text">봉사 활동명이 잘 드러나도록 작성해 주세요.</div>
          </div>
          <div class="unv-guide-item">
            <div class="unv-guide-dot"></div>
            <div class="unv-guide-text">특수문자나 광고성 문구는 삼가 주세요.</div>
          </div>
        </div>

        <div class="unv-guide-section">
          <div class="unv-guide-section-title">내용 작성 시</div>
          <div class="unv-guide-item">
            <div class="unv-guide-dot"></div>
            <div class="unv-guide-text">봉사 활동에 대한 솔직한 후기를 작성해 주세요.</div>
          </div>
          <div class="unv-guide-item">
            <div class="unv-guide-dot"></div>
            <div class="unv-guide-text">활동 날짜, 장소, 느낀 점 등을 포함하면 좋아요.</div>
          </div>
          <div class="unv-guide-item">
            <div class="unv-guide-dot"></div>
            <div class="unv-guide-text">다른 분들에게 도움이 될 정보를 공유해 주세요.</div>
          </div>
        </div>

        <div class="unv-guide-notice">
          <p><strong>유의사항</strong><br>허위 정보나 부적절한 내용이 포함된 게시글은 관리자에 의해 삭제될 수 있습니다.</p>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
