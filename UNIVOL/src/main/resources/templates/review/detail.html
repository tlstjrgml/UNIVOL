<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
  <title>봉사 게시글 상세</title>
  

  <!-- 폰트 -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      padding: 30px;
    }

    /* 로고 */
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      color: #424B1F;
      margin-bottom: 10px;
      letter-spacing: 2px;
      text-align: center;
    }

    /* 페이지 제목 */
    .page-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
      text-align: center;
    }

    /* 구분선 */
    .divider {
      border: none;
      border-top: 1px solid #ccc;
      margin: 10px 0 20px 0;
    }

    .container {
      width: 800px;
      margin: 0 auto;
    }

    .post-box, .comment-box {
      background-color: white;
      border: 1px solid #ccc;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .post-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .post-info {
      font-size: 14px;
      color: gray;
      margin-bottom: 20px;
    }

    .volunteer-info {
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 20px;
    }

    .post-content {
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .btn-area {
      text-align: right;
    }

    button {
      padding: 8px 15px;
      margin-left: 5px;
      cursor: pointer;
      border-radius: 10px;
      background-color: #424B1F;
      color: white;
      border: none;
    }

    button:hover {
      background-color: #2f3616;
    }

    .comment-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    textarea {
      width: 100%;
      height: 80px;
      padding: 10px;
      margin-bottom: 10px;
      resize: none;
    }

    .comment-item {
      border-top: 1px solid #ddd;
      padding: 10px 0;
    }

    .comment-writer {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .comment-date {
      font-size: 12px;
      color: gray;
      margin-bottom: 5px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th {
      background: #f0f0f0;
      width: 120px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }
    .reply-btn-small {
    padding: 6px 14px;
    background: #f1f1ed; /* 연한 베이지톤 */
    color: #555;
    border: 1px solid #d0d0c8;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
}

/* 수정 버튼에 마우스 올렸을 때 (강조색) */
.reply-btn-small:hover {
    background: #426B1F;
    color: #fff;
    border-color: #426B1F;
}

/* 삭제 버튼 (기존 reply-btn-delete 클래스) */
.reply-btn-delete {
    background: #fdf2f2;
    color: #ef4444;
    border-color: #fecaca;
}

/* 삭제 버튼에 마우스 올렸을 때 */
.reply-btn-delete:hover {
    background: #ef4444 !important;
    color: #fff !important;
    border-color: #ef4444 !important;
}

/* 수정 시 나타날 폼 박스 (toggle 시 보여줄 박스) */
.reply-edit-box { 
    background: #f9f9f7; 
    border-radius: 8px; 
    padding: 1.5rem; 
    margin-top: 10px; 
    border: 1px solid #e2e2da;
}

/* 수정창 내부 textarea */
.reply-edit-textarea { 
    width: 100%; 
    padding: 12px; 
    border: 1px solid #d0d0c8; 
    border-radius: 8px; 
    font-size: 13px; 
    resize: none; 
    min-height: 80px; 
    outline: none; 
}
.reply-edit-textarea:focus { 
    border-color: #426B1F; 
}
    .container { max-width: 1000px; margin: 2.5rem auto; padding: 0 2rem; }
    .back-btn { display: inline-block; margin-bottom: 1rem; padding: 8px 16px; background: #eaf3de; color: #426B1F; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; text-decoration: none; transition: background 0.15s; }
    .back-btn:hover { background: #d5e8c6; }
  </style>
</head>
<body>

  <!-- 로고 -->
  <div class="logo" onclick="location.href='/'" style="cursor: pointer;">UNIVOL</div>

  <!-- 페이지 제목 -->
  <div class="page-title">게시글 조회</div>

  <div class="container">
  	<div>
  		<!-- currentPage 대신 page 사용 -->
		<a class="back-btn" th:href="@{/review(page=${page})}">← 목록으로</a>
  	</div>

    <!-- 🔥 위치 이동된 hr -->
    <hr class="divider">

    <div class="post-box">
      <div class="post-title">[[${r.rTitle}]]</div>
      <div class="post-info">작성자: [[${r.userName}]] | 작성일: [[${r.rDate}]] | 조회수: [[${r.rViews}]]</div>


	<div id="view-mode">

	  
	
	  <div class="post-content">
	    [[${r.rContents}]]
	  </div>

	</div>

		<div id="edit-mode" style="display:none;">
		
		  <form th:action="@{/review/update}" method="post">
		
		    <input type="hidden" name="rNumber" th:value="${r.rNumber}">
		    <input type="hidden" name="page" th:value="${page}">
		
		    <input type="text" name="rTitle" th:value="${r.rTitle}">
		    <textarea name="rContents">[[${r.rContents}]]</textarea>
		    
		
		    <button type="submit">저장</button>
		    <button type="button" id="cancelBtn">취소</button>
		
		  </form>
		
		</div>
	
		
	     <div class="btn-area">

  			<th:block th:if="${session.loginUser != null and session.loginUser.userId == r.userId}">
			    <button id="editBtn">수정</button>
			    <button id="btn">삭제</button>
		  	</th:block>
		</div>

	    <div class="comment-box">
	    	<div class="comment-title">댓글</div>
	    		<textarea placeholder="댓글을 입력하세요" id="comments"></textarea>
	     	<div class="btn-area">
	        	<button id="replyBtn" th:disabled="${session.loginUser == null}">등록</button>
			</div>
			<div id='rList'>
			    <div class="comment-item" th:each="reply : ${list}">
			        <div class="comment-writer">[[${reply.userName}]]</div>
			        <div class="comment-date" th:text="${#dates.format(reply.cDate, 'yyyy-MM-dd')}"></div>
			        <div class="comment-content-text" th:id="'content-' + ${reply.cNumber}">[[${reply.comments}]]</div>
			        
			        <div class="reply-actions" th:if="${session.loginUser != null and reply.userId == session.loginUser.userId}">
			            <!-- 수정 버튼: 클릭 시 js 함수 호출 -->
			            <button type="button" class="reply-btn-small" 
			                    th:onclick="submitUpdate([[${reply.cNumber}]], this)">수정</button>
			            
			            <!-- 삭제 버튼 (기존 유지) -->
			            <form th:action="@{/review/reviewReply/{cno}/delete(cno=${reply.cNumber})}" method="POST" style="display:inline;">
			                <button type="submit" class="reply-btn-small" onclick="return confirm('삭제하시겠습니까?')">삭제</button>
			            </form>
			        </div>
			    </div>
			</div>
			
			<!-- 수정을 위해 서버로 데이터를 보낼 숨겨진 폼 (딱 하나만 있으면 됩니다) -->
			<form id="hiddenUpdateForm" th:action="@{/review/reviewReply/update}" method="POST" style="display:none;">
			    <input type="hidden" name="cNumber" id="updateCno">
			    <input type="hidden" name="userId" th:value="${session.loginUser.userId}">
			    <input type="hidden" name="comments" id="updateComments">
			    <!-- 만약 pNumber(게시글번호)가 필요하다면 추가 -->
			    <input type="hidden" name="pNumber" th:value="${r.rNumber}"> 
			    <input type="hidden" name="page" th:value="${page}">
			</form>
    	</div>

  </div>
</body>
<script th:inline='javascript'>
	
	window.onload = function () {
	
	  const viewMode = document.getElementById("view-mode");
	  const editMode = document.getElementById("edit-mode");
	
	  const editBtn = document.getElementById("editBtn");
	  const cancelBtn = document.getElementById("cancelBtn");
	
	  //  수정 버튼 클릭
	  editBtn.onclick = function () {
	    viewMode.style.display = "none";
	    editMode.style.display = "block";
	  };
	  //  취소 버튼 클릭
	  cancelBtn.onclick = function () {
	    viewMode.style.display = "block";
	    editMode.style.display = "none";
	  };
	  
	  // 삭제 버튼 클릭
	  const deleteMode = document.getElementById("btn");

		if (deleteMode != null) {
		    deleteMode.addEventListener('click', () => {
		        if (confirm("삭제하겠습니까?")) {
		            const form = document.querySelector("#edit-mode form");
		            form.action = "/review/delete";
		            form.method = "post";
		            form.submit();
		        }
		    });
		}

	  document.getElementById('replyBtn').addEventListener('click', () => {
		$.ajax({
			url: '/review/rinsert',
			data: {
				comments: document.getElementById('comments').value,
				pNumber: /*[[${r.rNumber}]]*/5,
				userId: /*[[${session.loginUser.userId}]]*/'user'
			},
			success: data => {
				console.log(data)
				const divPar = document.querySelector('#rList');
				divPar.innerHTML = '';
				
				for(const c of data){
					const commentItem = document.createElement('div');
					commentItem.classList.add('comment-item');  
					
					const writerDiv = document.createElement('div');
					writerDiv.classList.add('comment-writer');
					writerDiv.innerText = c.userName;
					
					const cDateDiv = document.createElement('div');
					cDateDiv.classList.add('comment-date');
					cDateDiv.innerText = c.cDate;
					
					const commentsDiv = document.createElement('div');
					commentsDiv.innerText = c.comments
					
					commentItem.append(writerDiv);
					commentItem.append(cDateDiv);
					commentItem.append(commentsDiv);
					divPar.append(commentItem);
				}
				document.getElementById('comments').value = '';
			},
			error: data => console.log(data)
		}); 
	  });
		
	
	};
	// 댓글 수정
	function submitUpdate(cNumber, btn) {

	    const contentDiv = document.getElementById(`content-${cNumber}`);
	    const original = contentDiv.innerText;
	
	    contentDiv.innerHTML = `<textarea id="edit-${cNumber}" style="width:100%; height:80px;">${original}</textarea>`;
	
	    btn.innerText = '완료';
	
	    btn.onclick = () => {
	        const newText =
	            document.getElementById(`edit-${cNumber}`).value;
	
	        if (!newText.trim()) {
	            alert("내용 입력");
	            return;
	        }

        document.getElementById('updateCno').value = cNumber;
        document.getElementById('updateComments').value = newText;

        document.getElementById('hiddenUpdateForm').submit();
    };
    
    // 댓글 삭제
    
}

</script>
</html>
