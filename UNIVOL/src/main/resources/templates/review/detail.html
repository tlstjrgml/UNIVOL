<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>봉사 게시글 상세</title>

  <!-- 폰트 -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      padding: 30px;
    }

    /* 로고 */
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      color: #424B1F;
      margin-bottom: 10px;
      letter-spacing: 2px;
      text-align: center;
    }

    /* 페이지 제목 */
    .page-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
      text-align: center;
    }

    /* 구분선 */
    .divider {
      border: none;
      border-top: 1px solid #ccc;
      margin: 10px 0 20px 0;
    }

    .container {
      width: 800px;
      margin: 0 auto;
    }

    .post-box, .comment-box {
      background-color: white;
      border: 1px solid #ccc;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .post-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .post-info {
      font-size: 14px;
      color: gray;
      margin-bottom: 20px;
    }

    .volunteer-info {
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 20px;
    }

    .post-content {
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .btn-area {
      text-align: right;
    }

    button {
      padding: 8px 15px;
      margin-left: 5px;
      cursor: pointer;
      border-radius: 10px;
      background-color: #424B1F;
      color: white;
      border: none;
    }

    button:hover {
      background-color: #2f3616;
    }

    .comment-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    textarea {
      width: 100%;
      height: 80px;
      padding: 10px;
      margin-bottom: 10px;
      resize: none;
    }

    .comment-item {
      border-top: 1px solid #ddd;
      padding: 10px 0;
    }

    .comment-writer {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .comment-date {
      font-size: 12px;
      color: gray;
      margin-bottom: 5px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th {
      background: #f0f0f0;
      width: 120px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }
  </style>
</head>
<body>

  <!-- 로고 -->
  <div class="logo">UNIVOL</div>

  <!-- 페이지 제목 -->
  <div class="page-title">게시글 조회</div>

  <div class="container">

    <!-- 🔥 위치 이동된 hr -->
    <hr class="divider">

    <div class="post-box">
      <div class="post-title">[[${r.rTitle}]]</div>
      <div class="post-info">작성자: [[${r.userName}]] | 작성일: [[${r.rDate}]] | 조회수: [[${r.rViews}]]</div>

      <div class="volunteer-info">
        <table>
          <tr>
            <th>봉사제목</th>
            <td>2024 겨울방학 청소년 멘토링 봉사</td>
          </tr>
          <tr>
            <th>봉사장소</th>
            <td>서울시 종로구 대왕빌딩</td>
          </tr>
          <tr>
            <th>봉사날짜</th>
            <td>2025년 1월 4일 ~ 2월 15일</td>
          </tr>
        </table>
      </div>
      

	<div id="view-mode">

	  <div class="post-title">[[${r.rTitle}]]</div>
	
	  <div class="post-content">
	    [[${r.rContents}]]
	  </div>

	</div>

		<div id="edit-mode" style="display:none;">
		
		  <form th:action="@{/review/update}" method="post">
		
		    <input type="hidden" name="rNumber" th:value="${r.rNumber}">
		    <input type="hidden" name="page" th:value="${page}">
		
		    <input type="text" name="rTitle" th:value="${r.rTitle}">
		
		    <textarea name="rContents">[[${r.rContents}]]</textarea>
		
		    <button type="submit">저장</button>
		    <button type="button" id="cancelBtn">취소</button>
		
		  </form>
		
		</div>
	
		
		
	      <div class="btn-area">
	        <button id="editBtn">수정</button>
	        <button>삭제</button>
	      </div>
	    </div>

    <div class="comment-box">
      <div class="comment-title">댓글</div>
      <textarea placeholder="댓글을 입력하세요"></textarea>
      <div class="btn-area">
        <button>등록</button>
      </div>

      <div class="comment-item">
        <div class="comment-writer">이수연</div>
        <div class="comment-date">2024.12.11</div>
        <div>정말 좋은 활동이네요!</div>
      </div>
    </div>

  </div>
</body>
<script>
	window.onload = function () {
	
	  const viewMode = document.getElementById("view-mode");
	  const editMode = document.getElementById("edit-mode");
	
	  const editBtn = document.getElementById("editBtn");
	  const cancelBtn = document.getElementById("cancelBtn");
	
	  // 🔥 수정 버튼 클릭
	  editBtn.onclick = function () {
	    viewMode.style.display = "none";
	    editMode.style.display = "block";
	  };
	
	  // 🔥 취소 버튼 클릭
	  cancelBtn.onclick = function () {
	    viewMode.style.display = "block";
	    editMode.style.display = "none";
	  };
	
	};

</script>
</html>
