<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${r.rTitle} + ' - UNIVOL'"></title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Noto Sans KR', sans-serif;
    }

    body {
      background: #f5f5f0;
      min-height: 100vh;
    }

    /* 수정된 container */
    .container {
      max-width: 1000px;
      margin: 2.5rem auto;
      padding: 0 2rem;
    }

    /* 수정된 카드 스타일 */
    .post-box,
    .comment-box {
      background: #fff;
      border: 1px solid #e0e0d8;
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .page-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
      text-align: center;
    }

    .post-title {
      font-size: 28px;
      font-weight: 700;
      color: #222;
      margin-bottom: 1rem;
    }

    .post-info {
      display: flex;
      gap: 1.5rem;
      font-size: 13px;
      color: #888;
      border-bottom: 1px solid #f0f0ea;
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }

    .volunteer-info {
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 20px;
    }

    .post-content {
      line-height: 1.8;
      color: #333;
      font-size: 14px;
      min-height: 300px;
      margin-bottom: 20px;
    }

    .btn-area {
      text-align: right;
    }

    button {
      padding: 8px 15px;
      margin-left: 5px;
      cursor: pointer;
      border-radius: 8px;
      background-color: #426B1F;
      color: white;
      border: none;
      transition: background 0.15s;
    }

    button:hover {
      background-color: #305215;
    }

    .comment-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    textarea {
      width: 100%;
      height: 80px;
      padding: 10px;
      margin-bottom: 10px;
      resize: none;
      border: 1px solid #d0d0c8;
      border-radius: 8px;
      outline: none;
    }

    textarea:focus {
      border-color: #426B1F;
    }

    .comment-item {
      border-top: 1px solid #f0f0ea;
      padding: 15px 0;
    }

    .comment-writer {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .comment-date {
      font-size: 12px;
      color: gray;
      margin-bottom: 5px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th {
      background: #f0f0f0;
      width: 120px;
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }
  </style>
</head>

<body>

  <div th:replace="common/navbar"></div>

  <div class="container">

    <div class="post-box">

      <div class="post-title">
        [[${r.rTitle}]]
      </div>

      <div class="post-info">
        <span>작성자: [[${r.userName}]]</span>
        <span>작성일: [[${r.rDate}]]</span>
        <span>조회수: [[${r.rViews}]]</span>
      </div>

      <div id="view-mode">

        <div class="post-content">
          [[${r.rContents}]]
        </div>

      </div>

      <div id="edit-mode" style="display:none;">

        <form th:action="@{/review/update}" method="post">

          <input type="hidden" name="rNumber" th:value="${r.rNumber}">
          <input type="hidden" name="page" th:value="${page}">

          <input type="text" name="rTitle" th:value="${r.rTitle}" style="width:100%; padding:10px; margin-bottom:10px;">

          <textarea name="rContents">[[${r.rContents}]]</textarea>

          <div class="btn-area">
            <button type="submit">저장</button>
            <button type="button" id="cancelBtn">취소</button>
          </div>

        </form>

      </div>

      <div class="btn-area">

        <th:block th:if="${session.loginUser.userId == r.userId}">
          <button id="editBtn">수정</button>
          <button>삭제</button>
        </th:block>

      </div>

    </div>

    <div class="comment-box">

      <div class="comment-title">댓글</div>

      <textarea placeholder="댓글을 입력하세요"></textarea>

      <div class="btn-area">
        <button>등록</button>
      </div>

      <div class="comment-item">
        <div class="comment-writer">이수연</div>
        <div class="comment-date">2024.12.11</div>
        <div>정말 좋은 활동이네요!</div>
      </div>

    </div>

  </div>

</body>

<script>
  window.onload = function () {

    const viewMode = document.getElementById("view-mode");
    const editMode = document.getElementById("edit-mode");

    const editBtn = document.getElementById("editBtn");
    const cancelBtn = document.getElementById("cancelBtn");

    editBtn.onclick = function () {
      viewMode.style.display = "none";
      editMode.style.display = "block";
    };

    cancelBtn.onclick = function () {
      viewMode.style.display = "block";
      editMode.style.display = "none";
    };

  };
</script>

</html>
