<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
  <title>봉사 게시글 상세</title>
  

  <!-- 폰트 -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      padding: 30px;
    }

    /* 로고 */
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      color: #424B1F;
      margin-bottom: 10px;
      letter-spacing: 2px;
      text-align: center;
    }

    /* 페이지 제목 */
    .page-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
      text-align: center;
    }

    /* 구분선 */
    .divider {
      border: none;
      border-top: 1px solid #ccc;
      margin: 10px 0 20px 0;
    }

    .container {
      width: 800px;
      margin: 0 auto;
    }

    .post-box, .comment-box {
      background-color: white;
      border: 1px solid #ccc;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .post-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .post-info {
      font-size: 14px;
      color: gray;
      margin-bottom: 20px;
    }

    .volunteer-info {
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 20px;
    }

    .post-content {
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .btn-area {
      text-align: right;
    }

    button {
      padding: 8px 15px;
      margin-left: 5px;
      cursor: pointer;
      border-radius: 10px;
      background-color: #424B1F;
      color: white;
      border: none;
    }

    button:hover {
      background-color: #2f3616;
    }

    .comment-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    textarea {
      width: 100%;
      height: 80px;
      padding: 10px;
      margin-bottom: 10px;
      resize: none;
    }

    .comment-item {
      border-top: 1px solid #ddd;
      padding: 10px 0;
    }

    .comment-writer {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .comment-date {
      font-size: 12px;
      color: gray;
      margin-bottom: 5px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th {
      background: #f0f0f0;
      width: 120px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }
  </style>
</head>
<body>

  <!-- 로고 -->
  <div class="logo" onclick="location.href='/'" style="cursor: pointer;">UNIVOL</div>

  <!-- 페이지 제목 -->
  <div class="page-title">게시글 조회</div>

  <div class="container">

    <!-- 🔥 위치 이동된 hr -->
    <hr class="divider">

    <div class="post-box">
      <div class="post-title">[[${r.rTitle}]]</div>
      <div class="post-info">작성자: [[${r.userName}]] | 작성일: [[${r.rDate}]] | 조회수: [[${r.rViews}]]</div>


	<div id="view-mode">

	  
	
	  <div class="post-content">
	    [[${r.rContents}]]
	  </div>

	</div>

		<div id="edit-mode" style="display:none;">
		
		  <form th:action="@{/review/update}" method="post">
		
		    <input type="hidden" name="rNumber" th:value="${r.rNumber}">
		    <input type="hidden" name="page" th:value="${page}">
		
		    <input type="text" name="rTitle" th:value="${r.rTitle}">
		    <textarea name="rContents">[[${r.rContents}]]</textarea>
		    
		
		    <button type="submit">저장</button>
		    <button type="button" id="cancelBtn">취소</button>
		
		  </form>
		
		</div>
	
		
		
	     <div class="btn-area">

  			<th:block th:if="${session.loginUser.userId == r.userId}">
			    <button id="editBtn">수정</button>
			    <button>삭제</button>
		  	</th:block>
		</div>

    <div class="comment-box">
    	<div class="comment-title">댓글</div>
    		<textarea placeholder="댓글을 입력하세요" id="comments"></textarea>
     	<div class="btn-area">
        	<button id="replyBtn" th:disabled="${session.loginUser == null}">등록</button>
		</div>
		<div id='rList'>
			<div class="comment-item" th:each="r : ${list}">
	   	    	<div class="comment-writer">[[${r.userName}]]</div>
  	    		<div class="comment-date" th:text="${r.cDate}"></div>
      			<div>[[${r.comments}]]</div>
			</div>
		</div>
    </div>

  </div>
</body>
<script th:inline='javascript'>
	window.onload = function () {
	
	  const viewMode = document.getElementById("view-mode");
	  const editMode = document.getElementById("edit-mode");
	
	  const editBtn = document.getElementById("editBtn");
	  const cancelBtn = document.getElementById("cancelBtn");
	
	  //  수정 버튼 클릭
	  editBtn.onclick = function () {
	    viewMode.style.display = "none";
	    editMode.style.display = "block";
	  };
	
	  //  취소 버튼 클릭
	  cancelBtn.onclick = function () {
	    viewMode.style.display = "block";
	    editMode.style.display = "none";
	  };
	  
	  document.getElementById('replyBtn').addEventListener('click', () => {
		$.ajax({
			url: '/review/rinsert',
			data: {
				comments: document.getElementById('comments').value,
				pNumber: /*[[${r.rNumber}]]*/5,
				userId: /*[[${session.loginUser.userId}]]*/'user'
			},
			success: data => {
				console.log(data)
				const divPar = document.querySelector('#rList');
				divPar.innerHTML = '';
				
				for(const c of data){
					const commentItem = document.createElement('div');
					commentItem.classList.add('comment-item'); /* 테스트 으갸갸갸갹 *//*  테스트 야야야야야야야 */
					
					const writerDiv = document.createElement('div');
					writerDiv.classList.add('comment-writer');
					writerDiv.innerText = c.userName;
					
					const cDateDiv = document.createElement('div');
					cDateDiv.classList.add('comment-date');
					cDateDiv.innerText = c.cDate;
					
					const commentsDiv = document.createElement('div');
					commentsDiv.innerText = c.comments
					
					commentItem.append(writerDiv);
					commentItem.append(cDateDiv);
					commentItem.append(commentsDiv);
					
					divPar.append(commentItem);
				}
				document.getElementById('comments').value = '';
			},
			error: data => console.log(data)
		}); 
	  });
	  
	
	};

</script>
</html>
