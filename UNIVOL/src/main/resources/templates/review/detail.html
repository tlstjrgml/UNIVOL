<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${r.rTitle} + ' - UNIVOL'"></title>
  <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
    body { background: #f5f5f0; min-height: 100vh; }

    /* 공통 레이아웃 */
    .container { max-width: 1000px; margin: 2.5rem auto; padding: 0 2rem; }
    .back-btn { display: inline-block; margin-bottom: 1rem; padding: 8px 16px; background: #eaf3de; color: #426B1F; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; text-decoration: none; transition: background 0.15s; }
    .back-btn:hover { background: #d5e8c6; }

    /* 게시글 박스 */
    .post-box, .comment-box { background: #fff; border: 1px solid #e0e0d8; border-radius: 12px; padding: 2rem; margin-bottom: 2rem; }
    .post-title { font-size: 28px; font-weight: 700; color: #222; margin-bottom: 1rem; }
    .post-info { display: flex; gap: 1.5rem; font-size: 13px; color: #888; border-bottom: 1px solid #f0f0ea; padding-bottom: 1rem; margin-bottom: 2rem; }
    .post-content { line-height: 1.8; color: #333; font-size: 14px; min-height: 300px; margin-bottom: 20px; }
    .btn-area { text-align: right; }

    /* 버튼 공통 */
    button { padding: 8px 15px; margin-left: 5px; cursor: pointer; border-radius: 8px; background-color: #426B1F; color: white; border: none; transition: background 0.15s; }
    button:hover { background-color: #305215; }

    /* 댓글 박스 */
    .comment-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
    textarea { width: 100%; height: 80px; padding: 10px; margin-bottom: 10px; resize: none; border: 1px solid #d0d0c8; border-radius: 8px; outline: none; }
    textarea:focus { border-color: #426B1F; }
    .comment-item { border-top: 1px solid #f0f0ea; padding: 15px 0; }
    .comment-writer { font-weight: bold; margin-bottom: 5px; }
    .comment-date { font-size: 12px; color: gray; margin-bottom: 5px; }

    /* 댓글 수정/삭제 버튼 */
    .reply-actions { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .reply-btn-small { padding: 6px 14px; background: #f1f1ed; color: #555; border: 1px solid #d0d0c8; border-radius: 4px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .reply-btn-small:hover { background: #426B1F; color: #fff; border-color: #426B1F; }
    .reply-btn-delete { background: #fdf2f2; color: #ef4444; border-color: #fecaca; }
    .reply-btn-delete:hover { background: #ef4444 !important; color: #fff !important; border-color: #ef4444 !important; }

    /* 댓글 수정 폼 */
    .reply-edit-box { background: #f9f9f7; border-radius: 8px; padding: 1.5rem; margin-top: 10px; border: 1px solid #e2e2da; }
    .reply-edit-textarea { width: 100%; padding: 12px; border: 1px solid #d0d0c8; border-radius: 8px; font-size: 13px; resize: none; min-height: 80px; outline: none; }
    .reply-edit-textarea:focus { border-color: #426B1F; }
  </style>
</head>
<body>

  <!-- 네비게이션 바 -->
  <div th:replace="~{common/navbar}"></div>

  <div class="container">

    <!-- 목록으로 버튼 -->
    <a class="back-btn" th:href="@{/review(page=${currentPage}, sort=${sort}, keyword=${keyword})}">← 목록으로</a>

    <!-- 게시글 박스 -->
    <div class="post-box">

      <!-- 게시글 제목/정보 -->
      <div class="post-title">[[${r.rTitle}]]</div>
      <div class="post-info">
        <span>작성자: [[${r.userName}]]</span>
        <span>작성일: [[${r.rDate}]]</span>
        <span>조회수: [[${r.rViews}]]</span>
      </div>

      <!-- 조회 모드 -->
      <div id="view-mode">
        <div class="post-content">[[${r.rContents}]]</div>
      </div>

      <!-- 수정 모드 -->
      <div id="edit-mode" style="display:none;">
        <form th:action="@{/review/update}" method="post">
          <input type="hidden" name="rNumber" th:value="${r.rNumber}">
          <input type="hidden" name="page" th:value="${page}">
          <input type="text" name="rTitle" th:value="${r.rTitle}" style="width:100%; padding:10px; margin-bottom:10px;">
          <textarea name="rContents">[[${r.rContents}]]</textarea>
          <div class="btn-area">
            <button type="submit">저장</button>
            <button type="button" id="cancelBtn">취소</button>
          </div>
        </form>
      </div>

      <!-- 수정/삭제/좋아요 버튼: 작성자만 수정/삭제 노출 -->
      <div class="btn-area" id="view-btn">
        <th:block th:if="${session.loginUser != null && session.loginUser.userId == r.userId}">
          <button id="editBtn">수정</button>
          <button id="deleteBtn">삭제</button>
        </th:block>
        <!-- 좋아요 버튼: 좋아요 상태에 따라 다르게 표시 -->
        <button th:if="${isLiked == 0}" class="like-btn" id="likeBtn">
          <span class="heart" id="heart">🤍[[${likeCount}]]</span>
          <span id="likeText">좋아요</span>
        </button>
        <button th:if="${isLiked == 1}" class="like-btn" id="likeBtn">
          <span class="heart" id="heart">❤️[[${likeCount}]]</span>
          <span id="likeText">안 좋아요</span>
        </button>
      </div>
    </div>

    <!-- 댓글 박스 -->
    <div class="comment-box">
      <div class="comment-title">댓글</div>

      <!-- 댓글 등록 -->
      <textarea id="comments" placeholder="댓글을 입력하세요"></textarea>
      <div class="btn-area">
        <button id="replyBtn" th:disabled="${session.loginUser == null}">등록</button>
      </div>

      <!-- 댓글 목록 -->
      <div id="rList">
        <div class="comment-item" th:each="reply : ${list}">
          <div class="comment-writer">[[${reply.userName}]]</div>
          <div class="comment-date" th:text="${#strings.substring(reply.cDate, 0, 10)}"></div>
          <div class="comment-content-text" th:id="'content-' + ${reply.cNumber}">[[${reply.comments}]]</div>

          <!-- 댓글 수정/삭제 버튼: 본인 댓글만 노출 -->
          <div class="reply-actions" th:if="${session.loginUser != null && reply.userId == session.loginUser.userId}">
            <button type="button" class="reply-btn-small"
                    th:onclick="'submitUpdate(' + ${reply.cNumber} + ', this)'">수정</button>
            <form th:action="@{/review/reviewReply/delete}" method="POST" class="delete-form" style="display:inline;">
              <input type="hidden" name="cNumber" th:value="${reply.cNumber}">
              <input type="hidden" name="rNumber" th:value="${r.rNumber}">
              <input type="hidden" name="page" th:value="${page}">
              <button type="button" class="btn-pre-delete reply-btn-small reply-btn-delete">삭제</button>
              <span class="confirm-group" style="display:none;">
                <button type="submit" class="reply-btn-small" style="background-color:#d33; color:white;">확인</button>
                <button type="button" class="btn-cancel reply-btn-small">취소</button>
              </span>
            </form>
          </div>
        </div>
      </div>

      <!-- 댓글 수정용 숨김 폼 -->
      <form id="hiddenUpdateForm" th:action="@{/review/reviewReply/update}" method="POST" style="display:none;">
        <input type="hidden" name="cNumber" id="updateCno">
        <input type="hidden" name="userId" th:value="${session.loginUser != null ? session.loginUser.userId : ''}">
        <input type="hidden" name="comments" id="updateComments">
        <input type="hidden" name="pNumber" th:value="${r.rNumber}">
        <input type="hidden" name="page" th:value="${page}">
      </form>
    </div>

  </div>

  <script th:inline="javascript">
    window.onload = function () {
      const viewMode = document.getElementById("view-mode");
      const editMode = document.getElementById("edit-mode");
      const userId = /*[[${session.loginUser != null ? session.loginUser.userId : ''}]]*/'';

      /* 게시글 수정 버튼 */
      const editBtn = document.getElementById("editBtn");
      if (editBtn) {
        editBtn.onclick = function () {
          viewMode.style.display = "none";
          editMode.style.display = "block";
          document.getElementById("view-btn").style.display = "none";
        };
      }

      /* 게시글 수정 취소 버튼 */
      const cancelBtn = document.getElementById("cancelBtn");
      if (cancelBtn) {
        cancelBtn.onclick = function () {
          viewMode.style.display = "block";
          editMode.style.display = "none";
          document.getElementById("view-btn").style.display = "block";
        };
      }

      /* 게시글 삭제 버튼 */
      const deleteBtn = document.getElementById("deleteBtn");
      if (deleteBtn) {
        deleteBtn.addEventListener('click', () => {
          if (confirm("삭제하겠습니까?")) {
            const form = document.querySelector("#edit-mode form");
            form.action = "/review/delete";
            form.method = "post";
            form.submit();
          }
        });
      }

      
      
      
      
      /* 댓글 등록 */
      document.getElementById('replyBtn').addEventListener('click', () => {
    	  if(document.getElementById('comments').value.length != 0){
    		  $.ajax({
    	          url: '/review/rinsert',
    	          data: {
    	            comments: document.getElementById('comments').value,
    	            pNumber: /*[[${r.rNumber}]]*/5,
    	            userId: /*[[${session.loginUser.userId}]]*/'user'
    	          },
    	          success: data => {
    	            const divPar = document.querySelector('#rList');
    	            divPar.innerHTML = '';
    	            for (const c of data) {
    	              const commentItem = document.createElement('div');
    	              commentItem.classList.add('comment-item');
    	              const writerDiv = document.createElement('div');
    	              writerDiv.classList.add('comment-writer');
    	              writerDiv.innerText = c.userName;
    	              const cDateDiv = document.createElement('div');
    	              cDateDiv.classList.add('comment-date');
    	              cDateDiv.innerText = c.cDate.substr(0,10);
    	              const commentsDiv = document.createElement('div');
    	              commentsDiv.id=`content-${c.cNumber}`;
    	              commentsDiv.innerText = c.comments;
    	              commentItem.append(writerDiv, cDateDiv, commentsDiv);
    	              if (c.userId === userId) {
    	                  const actionsDiv = document.createElement('div');
    	                  actionsDiv.classList.add('reply-actions');
    	                  actionsDiv.innerHTML = `
    	                    <button type="button" class="reply-btn-small" onclick="submitUpdate(${c.cNumber}, this)">수정</button>
    	                    <form action="/review/reviewReply/delete" method="POST" class="delete-form" style="display:inline;">
    	                      <input type="hidden" name="cNumber" value="${c.cNumber}">
    	                      <input type="hidden" name="rNumber" value="${document.getElementById('updateCno').closest('form').querySelector('[name=pNumber]').value}">
    	                      <input type="hidden" name="page" value="${document.querySelector('input[name=page]').value}">
    	                      <button type="button" class="btn-pre-delete reply-btn-small reply-btn-delete">삭제</button>
    	                      <span class="confirm-group" style="display:none;">
    	                        <button type="submit" class="reply-btn-small" style="background-color:#d33; color:white;">확인</button>
    	                        <button type="button" class="btn-cancel reply-btn-small">취소</button>
    	                      </span>
    	                    </form>
    	                  `;
    	                  commentItem.append(actionsDiv);
    	                }
    	              
    	              divPar.append(commentItem);
    	            }
    	            document.getElementById('comments').value = '';
    	          },
    	          error: data => console.log(data)
    	        });
    	  }else{
    		alert('댓글 내용을 작성해주세요');
  			document.getElementById('comments').focus();
    	  }
        
      });

      /* 좋아요 버튼: 서버 응답 기반으로 상태 업데이트 */
      const likeBtn = document.getElementById('likeBtn');
      const heart = document.getElementById('heart');
      const likeText = document.getElementById('likeText');

      if (likeBtn) {
        likeBtn.addEventListener('click', () => {
          $.ajax({
            url: '/review/like',
            method: 'POST',
            data: {
              pNumber: /*[[${r.rNumber}]]*/99,
              userId: /*[[${session.loginUser.userId}]]*/'user00'
            },
            success: data => {
              if (data.liked) {
                heart.innerText = '❤️' + data.likeCount;
                likeText.innerText = '안 좋아요';
              } else {
                heart.innerText = '🤍' + data.likeCount;
                likeText.innerText = '좋아요';
              }
            },
            error: data => console.log(data)
          });
        });
      }

      /* 댓글 삭제 확인/취소 버튼 */
      document.addEventListener('click', (e) => {
        if (e.target.classList.contains('btn-pre-delete')) {
          const form = e.target.closest('.delete-form');
          e.target.style.display = 'none';
          form.querySelector('.confirm-group').style.display = 'inline';
        }
        if (e.target.classList.contains('btn-cancel')) {
          const form = e.target.closest('.delete-form');
          form.querySelector('.confirm-group').style.display = 'none';
          form.querySelector('.btn-pre-delete').style.display = 'inline';
        }
      });
    };

    /* 댓글 수정 */
    function submitUpdate(cNumber, btn) {
      const contentDiv = document.getElementById(`content-${cNumber}`);
      const original = contentDiv.innerText;
      contentDiv.innerHTML = `<textarea id="edit-${cNumber}" style="width:100%; height:80px;">${original}</textarea>`;
      btn.innerText = '완료';
      btn.onclick = () => {
        const newText = document.getElementById(`edit-${cNumber}`).value;
        if (!newText.trim()) {
          alert("내용 입력");
          return;
        }
        document.getElementById('updateCno').value = cNumber;
        document.getElementById('updateComments').value = newText;
        document.getElementById('hiddenUpdateForm').submit();
      };
    }
  </script>

</body>
</html>
