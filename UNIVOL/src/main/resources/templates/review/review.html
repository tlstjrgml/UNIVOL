<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNIVOL - 후기게시판</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
    body { background: #f5f5f0; min-height: 100vh; }
    .container { max-width: 1200px; margin: 2.5rem auto; padding: 0 3rem; }
    .page-title { font-size: 22px; font-weight: 700; color: #222; margin-bottom: 1.5rem; }
    .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-group { display: flex; align-items: center; gap: 8px; flex: 1; flex-wrap: wrap; }
    select, .search-input { font-size: 13px; padding: 7px 12px; border: 1px solid #d0d0c8; border-radius: 8px; background: #fff; color: #333; outline: none; cursor: pointer; transition: border-color 0.15s; }
    select:focus, .search-input:focus { border-color: #426B1F; }
    .search-input { flex: 1; min-width: 160px; cursor: text; }
    .search-btn { font-size: 13px; padding: 7px 16px; border-radius: 8px; border: none; background: #426B1F; color: #fff; cursor: pointer; transition: background 0.15s; }
    .search-btn:hover { background: #305215; }
    .write-btn { font-size: 13px; padding: 7px 18px; border-radius: 8px; border: none; background: #426B1F; color: #fff; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
    .write-btn:hover { background: #305215; }
    .card { background: #fff; border: 1px solid #e0e0d8; border-radius: 12px; overflow: hidden; }
    .board-table { width: 100%; border-collapse: collapse; }
    .board-table thead tr { background: #f7f7f2; border-bottom: 1px solid #e0e0d8; }
    .board-table thead th { font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.04em; padding: 10px 12px; text-align: center; }
    .board-table thead th.col-title { text-align: left; }
    .board-table tbody tr { border-bottom: 1px solid #f0f0ea; cursor: pointer; transition: background 0.12s; }
    .board-table tbody tr:last-child { border-bottom: none; }
    .board-table tbody tr:hover { background: #f7faf5; }
    .board-table tbody td { padding: 14px 12px; text-align: center; vertical-align: middle; }
    .board-table tbody td.col-title { text-align: left; }
    .num    { font-size: 13px; color: #aaa; }
    .title-wrap { display: flex; flex-direction: column; gap: 3px; }
    .title  { font-size: 14px; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 500px; }
    .date   { font-size: 11px; color: #bbb; }
    .author { font-size: 13px; color: #555; }
    .views  { font-size: 13px; color: #888; }
    .likes  { font-size: 13px; color: #c0392b; }
    .col-num    { width: 70px; }
    .col-author { width: 90px; }
    .col-views  { width: 80px; }
    .col-likes  { width: 70px; }
    .pagination { display: flex; justify-content: center; align-items: center; gap: 6px; margin-top: 1.5rem; }
    .page-btn { text-decoration: none; width: 34px; height: 34px; border-radius: 8px; border: 1px solid #e0e0d8; background: #fff; font-size: 13px; color: #555; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.12s, color 0.12s; }
    .page-btn:hover { background: #eaf3de; color: #426B1F; border-color: #426B1F; }
    .page-btn.active { background: #426B1F; color: #fff; border-color: #426B1F; }
    .empty { padding: 3rem; text-align: center; color: #bbb; font-size: 14px; }
  </style>
</head>
<body>

  <div th:replace="~{common/navbar.html}"></div>

  <main class="container">
    <h1 class="page-title">후기게시판</h1>

    <div class="toolbar">
      <form class="filter-group" method="get" action="/review">
        <select name="sort" onchange="this.form.submit()">
          <option value="latest"     th:selected="${sort == 'latest'}">최신순</option>
          <option value="views_desc" th:selected="${sort == 'views_desc'}">조회수 높은순</option>
          <option value="views_asc"  th:selected="${sort == 'views_asc'}">조회수 낮은순</option>
        </select>
        <input type="text" name="keyword" th:value="${keyword}"
               class="search-input" placeholder="제목 또는 작성자 검색"/>
        <button type="submit" class="search-btn">검색</button>
      </form>
      <button class="write-btn" th:if="${session.loginUser}"
              onclick="location.href='/review/write'">+ 글쓰기</button>
    </div>

    <div class="card">
      <table class="board-table">
        <thead>
          <tr>
            <th class="col-num">글번호</th>
            <th class="col-title">제목</th>
            <th class="col-author">작성자</th>
            <th class="col-views">조회수</th>
            <th class="col-likes">좋아요</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="r : ${list}"
              th:onclick="|location.href='/review/' + ${r.rNumber} + '/' + ${pi.currentPage}|">
            <td class="col-num num" th:text="${r.rNumber}"></td>
            <td class="col-title">
              <div class="title-wrap">
                <span class="title" th:text="${r.rTitle}"></span>
                <span class="date"  th:text="${r.rDate}"></span>
              </div>
            </td>
            <td class="col-author author" th:text="${r.userName}"></td>
            <td class="col-views views"   th:text="${r.rViews}"></td>
            <td class="col-likes likes"></td>
          </tr>
        </tbody>
      </table>
    </div>

    <nav class="pagination">
      <button type="button" class="page-btn"
              th:if="${pi.currentPage > 1}"
              th:onclick="'goToPage(' + ${pi.currentPage - 1} + ')'">&#8249;</button>

      <th:block th:each="n : ${#numbers.sequence(pi.startPage, pi.endPage)}">
        <form th:id="'pageForm-' + ${n}" action="/review" method="get" style="display:none;">
          <input type="hidden" name="page"    th:value="${n}">
          <input type="hidden" name="keyword" th:value="${keyword}">
          <input type="hidden" name="sort"    th:value="${sort}">
        </form>
        <button type="button" class="page-btn"
                th:text="${n}"
                th:classappend="${n == pi.currentPage} ? 'active'"
                th:onclick="'goToPage(' + ${n} + ')'">
        </button>
      </th:block>

      <button type="button" class="page-btn"
              th:if="${pi.currentPage < pi.maxPage}"
              th:onclick="'goToPage(' + ${pi.currentPage + 1} + ')'">&#8250;</button>
    </nav>

  </main>

  <script>
    function goToPage(pageNum) {
      document.getElementById('pageForm-' + pageNum).submit();
    }
  </script>

</body>
</html>
