
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNIVOL - navbar</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    .header {
      background: #fff;
      border-bottom: 1px solid #e0e0d8;
      padding: 0 2rem;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      height: 58px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 500;
      color: #426B1F;
      letter-spacing: 2px;
      cursor: pointer;
    }
    .nav {
      display: flex;
      gap: 24px;
      justify-content: center;
    }
    .nav a {
      font-size: 14px;
      color: #444;
      text-decoration: none;
      padding: 4px 0;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .nav a.active, .nav a:hover {
      color: #426B1F;
      border-bottom-color: #426B1F;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: flex-end;
    }
    .username {
      font-size: 14px;
      color: #666;
    }
    .header-btn {
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid #426B1F;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-outline {
      background: transparent;
      color: #426B1F;
    }
    .btn-outline:hover {
      background: #eaf3de;
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo" onclick="location.href='/'">UNIVOL</div>
  <nav class="nav">
    <a th:href="@{/volunteer}" th:classappend="${currentPage == 'volunteer'} ? 'active'">봉사게시판</a>
    <a th:href="@{/review}" th:classappend="${currentPage == 'review'} ? 'active'">후기게시판</a>
  </nav>
  <div class="header-right">
    <!-- 로그인 안 했을 때 -->
    <span th:if="${session.loginUser == null}">
      <a th:href="@{/logIn}" class="header-btn btn-outline">로그인</a>
      <a th:href="@{/signUp}" class="header-btn btn-outline">회원가입</a>
    </span>
    <!-- 로그인 했을 때 -->
    <span th:if="${session.loginUser != null}">
      <span class="username" th:text="${session.loginUser.userName} + '님'"></span>
      <a th:href="@{/mypage}" class="header-btn btn-outline">마이페이지</a>
      <a th:href="@{/logout}" class="header-btn btn-outline">로그아웃</a>
    </span>
  </div>
</header>

</body>
</html>
