<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNIVOL</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
    body { background: #f5f5f0; min-height: 100vh; }

    .container {
      max-width: 1100px;
      margin: 3rem auto;
      padding: 0 2rem;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      color: #222;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #426B1F;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .section-title a {
      font-size: 13px;
      font-weight: 400;
      color: #426B1F;
      text-decoration: none;
    }

    .section-title a:hover {
      text-decoration: underline;
    }

    .board-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
      margin-bottom: 3rem;
    }

    .board-table thead tr {
      background: #426B1F;
      color: white;
    }

    .board-table thead th {
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
    }

    .board-table thead th:nth-child(2) {
      text-align: left;
    }

    .board-table tbody tr {
      border-bottom: 1px solid #f0f0ea;
      transition: background 0.12s;
      cursor: pointer;
    }

    .board-table tbody tr:last-child {
      border-bottom: none;
    }

    .board-table tbody tr:hover {
      background: #f7faf5;
    }

    .board-table tbody td {
      padding: 12px 16px;
      font-size: 14px;
      color: #444;
      text-align: center;
    }

    .board-table tbody td:nth-child(2) {
      text-align: left;
      color: #222;
    }

    .board-table tbody td.views {
      color: #888;
      font-size: 13px;
    }

    .board-table tbody td.likes {
      color: #c0392b;
      font-size: 13px;
    }

    .empty {
      text-align: center;
      padding: 2rem;
      color: #bbb;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div th:replace="~{common/navbar.html}"></div>
  <div class="container">

    
    <div class="section-title">
      봉사게시판
      <a th:href="@{/post}">더보기 &rsaquo;</a>
    </div>
    <table class="board-table">
      <thead>
        <tr>
          <th style="width:70px;">글번호</th>
          <th>제목</th>
          <th style="width:100px;">작성자</th>
          <th style="width:80px;">조회수</th>
          <th style="width:70px;">좋아요</th>
        </tr>
      </thead>
      <tbody>
       	<tr>
          <td>1</td>
          <td>겨울방학 청소년 멘토링 봉사 모집</td>
          <td>홍길동</td>
          <td class="views">1,085</td>
          <td class="likes">♥ 34</td>
        </tr>
	    <!-- test -->
         
      </tbody>
    </table>

    
    <div class="section-title">
      후기게시판
      <a th:href="@{/review}">더보기 &rsaquo;</a>
    </div>
    <table class="board-table">
      <thead>
        <tr>
          <th style="width:70px;">글번호</th>
          <th>제목</th>
          <th style="width:100px;">작성자</th>
          <th style="width:80px;">조회수</th>
          <th style="width:70px;">좋아요</th>
        </tr>
      </thead>
      <tbody>
          <td>1</td>
          <td>멘토링 봉사 다녀왔어요!</td>
          <td>홍길동</td>   <!-- 테스트 -->
          <td class="views">320</td>
          <td class="likes">♥ 12</td>
      </tbody>
    </table>

  </div>

</body>
</html>
