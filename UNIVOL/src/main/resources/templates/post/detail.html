<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${post.pTitle} + ' - UNIVOL'"></title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
    body { background: #f5f5f0; min-height: 100vh; }
    .container { max-width: 1000px; margin: 2.5rem auto; padding: 0 2rem; }

    /* 게시글 헤더 */
    .post-header { background: #fff; border: 1px solid #e0e0d8; border-radius: 12px; padding: 2rem; margin-bottom: 2rem; }
    .post-title { font-size: 28px; font-weight: 700; color: #222; margin-bottom: 1rem; }
    .post-meta { display: flex; gap: 1.5rem; font-size: 13px; color: #888; border-bottom: 1px solid #f0f0ea; padding-bottom: 1rem; }
    .meta-item { display: flex; align-items: center; gap: 4px; }

    /* 게시글 본문 */
    .post-content { background: #fff; border: 1px solid #e0e0d8; border-radius: 12px; padding: 2rem; margin-bottom: 2rem; line-height: 1.8; color: #333; font-size: 14px; min-height: 300px; }

    /* 댓글 섹션 */
    .reply-section { background: #fff; border: 1px solid #e0e0d8; border-radius: 12px; padding: 2rem; }
    .reply-title { font-size: 16px; font-weight: 700; color: #222; margin-bottom: 1.5rem; }
    .reply-input-box form { display: flex; flex-direction: column; align-items: flex-end; }
    .reply-input-box { margin-bottom: 2rem; padding: 1.5rem; background: #f9f9f7; border-radius: 8px; }
    .reply-textarea { width: 100%; padding: 12px; border: 1px solid #d0d0c8; border-radius: 8px; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; resize: vertical; min-height: 80px; outline: none; }
    .reply-textarea:focus { border-color: #426B1F; }
    .reply-btn { margin-top: 8px; padding: 8px 20px; background: #426B1F; color: #fff; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; transition: background 0.15s; }
    .reply-btn:hover { background: #305215; }

    /* 댓글 목록 */
    .reply-item { padding: 1.5rem; border-bottom: 1px solid #f0f0ea; display: flex; justify-content: space-between; align-items: flex-start; }
    .reply-item:last-child { border-bottom: none; }
    .reply-content-wrap { flex: 1; }
    .reply-author { font-size: 13px; font-weight: 600; color: #222; }
    .reply-text { font-size: 13px; color: #555; margin: 6px 0; line-height: 1.6; }
    .reply-date { font-size: 11px; color: #aaa; }

    /* 댓글 수정/삭제 버튼 */
    .reply-actions { display: flex; gap: 8px; }
    .reply-btn-small { font-size: 11px; padding: 4px 10px; border: 1px solid #d0d0c8; background: #fff; color: #666; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
    .reply-btn-small:hover { border-color: #426B1F; color: #426B1F; }
    .reply-btn-delete { border-color: #e0cccc; color: #c0392b; }
    .reply-btn-delete:hover { border-color: #c0392b; background: #fff5f5; }

    /* 댓글 수정 폼 */
    .reply-edit-box { background: #f9f9f7; border-radius: 8px; padding: 1.5rem; margin-top: 10px; }
    .reply-edit-textarea { width: 100%; padding: 12px; border: 1px solid #d0d0c8; border-radius: 8px; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; resize: none; min-height: 60px; outline: none; }
    .reply-edit-textarea:focus { border-color: #426B1F; }
    .reply-edit-actions { margin-top: 8px; display: flex; gap: 8px; }
    .reply-edit-btn { padding: 6px 14px; background: #426B1F; color: #fff; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; }
    .reply-edit-btn:hover { background: #305215; }
    .reply-cancel-btn { padding: 6px 14px; background: #ddd; color: #666; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; }
    .reply-cancel-btn:hover { background: #ccc; }

    /* 기타 */
    .empty-message { text-align: center; padding: 2rem; color: #aaa; font-size: 13px; }
    .back-btn { display: inline-block; margin-bottom: 1rem; padding: 8px 16px; background: #eaf3de; color: #426B1F; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; text-decoration: none; transition: background 0.15s; }
    .back-btn:hover { background: #d5e8c6; }
	.action-btn{
		padding: 6px 16px;
		background: #426B1F;
		color: #fff;
		border: none;
		border-radius: 6px;
		font-size: 13px;
		cursor: pointer;
	}
	.action-btn-disabled {
	    padding: 6px 16px;
	    background: #aaa;
	    color: #fff;
	    border: none;
	    border-radius: 6px;
	    font-size: 13px;
	    cursor: pointer;
	}
  </style>
</head>
<body>

  <div th:replace="~{common/navbar}"></div>

  <main class="container">

    <!-- 목록으로 버튼: 이전 페이지/검색 상태 유지 -->
    <a class="back-btn" th:href="@{/post(page=${currentPage}, sort=${sort}, keyword=${keyword})}">← 목록으로</a>

    <!-- 게시글 헤더: 제목, 작성자, 작성일, 조회수 -->
    <div class="post-header">
      <div style="display:flex; align-items:baseline; gap:12px;">
        <h1 class="post-title" th:text="${post.pTitle}"></h1>
      </div>
      <div class="post-meta">
        <div class="meta-item">
          <span th:text="${post.userName}"></span>
        </div>
        <div class="meta-item">
          <span th:text="${#dates.format(post.createDate, 'yyyy-MM-dd')}"></span>
        </div>
        <div class="meta-item">
          <span>조회수</span>
          <span th:text="${post.views}"></span>
        </div>
      </div>
    </div>

    <!-- 게시글 본문: 봉사 정보 테이블 + 내용 -->
    <div class="post-content" id="post-content">
      <table style="width:100%; border-collapse:collapse; margin-bottom:1.5rem;">
        <tr>
          <th style="background:#f7f7f2; border:1px solid #e0e0d8; padding:12px 16px; width:120px; font-weight:700; color:#333;">봉사제목</th>
          <td style="border:1px solid #e0e0d8; padding:12px 16px;" th:text="${post.pTitle}"></td>
        </tr>
        <tr>
          <th style="background:#f7f7f2; border:1px solid #e0e0d8; padding:12px 16px; font-weight:700; color:#333;">봉사날짜</th>
          <td style="border:1px solid #e0e0d8; padding:12px 16px;" th:text="${post.pDate}"></td>
        </tr>
      </table>

      <p style="font-size:14px; font-weight:700; color:#333; margin-bottom:8px;">봉사내용</p>
      <p th:text="${post.contents}" style="font-size:14px; line-height:1.8; color:#555; margin-bottom:1.5rem;"></p>

      <!-- 게시글 수정/삭제 버튼: 작성자 또는 관리자만 노출 -->
      <!-- <div th:if="${loginUser != null && (loginUser.userId == post.userId || loginUser.isAdmin == 'Y')}"
           style="display:flex; justify-content:flex-end; gap:6px;">
        <button id="editPostBtn" type="button"
                style="padding:6px 16px; background:#426B1F; color:#fff; border:none; border-radius:6px; font-size:13px; cursor:pointer;">수정</button>
        <form th:action="@{/post/delete/{pNumber}(pNumber=${post.pNumber})}" method="post" style="display:inline;">
          <button id="deletePostBtn" type="submit"
                  style="padding:6px 16px; background:#c0392b; color:#fff; border:none; border-radius:6px; font-size:13px; cursor:pointer;">삭제</button>
        </form>
        <button id="editPostBtn" type="button" style="padding:6px 16px; background:#426B1F; color:#fff; border:none; border-radius:6px; font-size:13px; cursor:pointer;">수정</button>
        <button id="deletePostBtn" type="button" style="padding:6px 16px; background:#c0392b; color:#fff; border:none; border-radius:6px; font-size:13px; cursor:pointer;">삭제</button>
      </div> -->
      
      <div style="display:flex; justify-content:flex-end; gap:6px;">
       	<th:block th:if="${loginUser != null && loginUser.userId == post.userId || loginUser.isAdmin == 'Y'}">
       	
	      	<form th:action="@{/post/edit/{pNumber}(pNumber=${post.pNumber})}" method="post">
	      		<button id="editPostBtn" type="submit" style="padding:6px 16px; background:#426B1F; color: #fff; border: none; border-radius:6px; font-size:13px; cursor:pointer;">수정</button>
	      	</form>
	      	<form th:action="@{/post/delete/{pNumber}(pNumber=${post.pNumber})}" method="post">
	      		<button id="deletePostBtn" type="submit" style="padding:6px 16px; background:#426B1F; color: red; border: none; border-radius:6px; font-size:13px; cursor:pointer;">삭제</button>
	      	</form>
       	</th:block>
	      	 <button th:if="${isLiked == 0}" class="action-btn" id="likeBtn">
			  <span class="heart" id="heart">🤍[[${likeCount}]]</span>
			  <span id="likeText">좋아요</span>
			</button>
			<button th:if="${isLiked == 1}" class="action-btn" id="likeBtn">
			  <span class="heart" id="heart">❤️[[${likeCount}]]</span>
			  <span id="likeText">안 좋아요</span>
			</button>
			<th:block th:if="${loginUser != null && isApplied == 0}">
				<button type="button" id="applyBtn" class="action-btn">참여하기</button>
			</th:block>
			<th:block th:if="${loginUser != null && isApplied == 1}">
				<button type="button" id="applyBtn" class="action-btn-disabled">참여완료</button>
			</th:block>
			
      	
      </div>
    </div>

    <!-- 댓글 섹션 -->
    <div class="reply-section">
      <h2 class="reply-title">댓글 (<span th:text="${replyList.size()}">0</span>)</h2>

      <!-- 댓글 등록 폼 -->
      <div class="reply-input-box">
        <form method="POST" th:action="@{/post/{pNumber}/reply(pNumber=${post.pNumber})}" onsubmit="return validateReply()">
          <textarea class="reply-textarea" name="comments" placeholder="참여하려면 댓글을 달아주세요" id="reply"></textarea>
          <input type="hidden" name="currentPage" th:value="${currentPage}">
          <input type="hidden" name="sort" th:value="${sort}">
          <input type="hidden" name="keyword" th:value="${keyword}">
          <button type="submit" class="reply-btn">댓글 등록</button>
        </form>
      </div>

      <!-- 댓글 목록 -->
      <div class="reply-list" id="reply-list">
        <div th:if="${replyList.isEmpty()}" class="empty-message">아직 댓글이 없습니다.</div>

        <div th:each="reply : ${replyList}" class="reply-item"
             th:id="'reply-' + ${reply.cNumber}"
             th:data-pnumber="${reply.pNumber}">
          <div class="reply-content-wrap">
            <div class="reply-author" th:text="${reply.userName}"></div>
            <div class="reply-text" th:id="'reply-text-' + ${reply.cNumber}" th:text="${reply.comments}"></div>
            <div class="reply-date" th:text="${reply.cDate}"></div>
            <div th:id="'reply-edit-form-' + ${reply.cNumber}"></div>
          </div>

          <!-- 댓글 수정/삭제 버튼: 본인 댓글만 노출 -->
          <div class="reply-actions" th:if="${loginUser != null && reply.userId == loginUser.userId}">
            <button type="button" class="reply-btn-small"
                    th:onclick="'toggleEditForm(' + ${reply.cNumber} + ')'">수정</button>
            <form th:id="'delete-form-' + ${reply.cNumber}"
                  method="POST"
                  th:action="@{/post/reply/{cNumber}/delete(cNumber=${reply.cNumber})}"
                  style="display:inline;">
              <input type="hidden" name="pNumber" th:value="${post.pNumber}">
              <input type="hidden" name="currentPage" th:value="${currentPage}">
              <input type="hidden" name="sort" th:value="${sort}">
              <input type="hidden" name="keyword" th:value="${keyword}">
              <button type="button" class="reply-btn-small reply-btn-delete"
                      onclick="if(confirm('댓글을 삭제하시겠습니까?')) this.form.submit();">삭제</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script th:inline="javascript">
    const contentDiv = document.getElementById('post-content');
    const originalContent = contentDiv.innerHTML;
    const pNumber = /*[[${post.pNumber}]]*/0;
    const pTitle = /*[[${post.pTitle}]]*/'';
    const pDate = /*[[${post.pDate}]]*/'';
    const contents = /*[[${post.contents}]]*/'';
    const currentPage = /*[[${currentPage}]]*/1;

    /* 게시글 수정 */
    document.addEventListener('click', (e) => {
      if (e.target.id == 'editPostBtn') {
        contentDiv.innerHTML = `
          <form action="/post/edit/${pNumber}" method="post" style="display:flex; flex-direction:column; gap:1rem;">
            <table style="width:100%; border-collapse:collapse; margin-bottom:1.5rem;">
              <tr>
                <th style="background:#f7f7f2; border:1px solid #e0e0d8; padding:12px 16px; width:120px; font-weight:700; color:#333;">봉사제목</th>
                <td style="border:1px solid #e0e0d8; padding:12px 16px;">
                  <input type="text" name="pTitle" value="${pTitle}" style="width:100%; padding:8px; border:1px solid #d0d0c8; border-radius:6px; font-size:14px; outline:none;">
                </td>
              </tr>
              <tr>
                <th style="background:#f7f7f2; border:1px solid #e0e0d8; padding:12px 16px; font-weight:700; color:#333;">봉사날짜</th>
                <td style="border:1px solid #e0e0d8; padding:12px 16px;">
                  <input type="date" name="pDate" value="${pDate.substring(0,10)}" style="padding:8px; border:1px solid #d0d0c8; border-radius:6px; font-size:14px; outline:none;">
                </td>
              </tr>
            </table>
            <p style="font-size:14px; font-weight:700; color:#333; margin-bottom:8px;">봉사내용</p>
            <textarea name="contents" style="width:100%; padding:12px; border:1px solid #d0d0c8; border-radius:8px; font-size:14px; line-height:1.8; min-height:150px; resize:vertical; outline:none;">${contents}</textarea>
            <input type="hidden" name="currentPage" value="${currentPage}">
            <div style="display:flex; justify-content:flex-end; gap:6px;">
              <button type="submit" style="padding:6px 16px; background:#426B1F; color:#fff; border:none; border-radius:6px; font-size:13px; cursor:pointer;">저장</button>
              <button type="button" onclick="contentDiv.innerHTML = originalContent" style="padding:6px 16px; background:#ddd; color:#666; border:none; border-radius:6px; font-size:13px; cursor:pointer;">취소</button>
            </div>
          </form>
        `;
      }
    });

    /* 게시글 삭제 확인 */
    const deletePostBtn = document.getElementById('deletePostBtn');
    if (deletePostBtn) {
      deletePostBtn.addEventListener('click', (e) => {
        const result = confirm('정말로 삭제하시겠습니까? 삭제된 글은 복구가 어렵습니다.');
        if (result == false) {
          e.preventDefault();
        }
      });
    }
    
    /* 댓글 내용이 없을 때 */
    function validateReply(){
		if(document.getElementById('reply').value.length == 0){
			alert('댓글 내용을 작성해주세요');
			document.getElementById('reply').focus();
			return false
		}return true
    }
    /* 댓글 수정 폼 토글 */
    function toggleEditForm(cNumber) {
      const formDiv = document.getElementById(`reply-edit-form-${cNumber}`);
      const textDiv = document.getElementById(`reply-text-${cNumber}`);
      const replyItem = document.getElementById(`reply-${cNumber}`);
      const pNumber = replyItem.getAttribute('data-pnumber');

      if (formDiv.innerHTML === '') {
        const originalText = textDiv.textContent;
        const currentPage = document.querySelector('input[name="currentPage"]').value;
        const sort = document.querySelector('input[name="sort"]').value;
        const keyword = document.querySelector('input[name="keyword"]').value;
        formDiv.innerHTML = `
          <div class="reply-edit-box">
            <form action="/post/reply/{cNumber}/update" method="POST" onsubmit="return submitEditForm(event, ${cNumber})">
              <textarea class="reply-edit-textarea" name="comments" id="edit-textarea-${cNumber}">${originalText}</textarea>
              <input type="hidden" name="pNumber" value="${pNumber}">
              <input type="hidden" name="currentPage" value="${currentPage}">
              <input type="hidden" name="sort" value="${sort}">
              <input type="hidden" name="keyword" value="${keyword}">
              <div class="reply-edit-actions">
                <button type="submit" class="reply-edit-btn">저장</button>
                <button type="button" class="reply-cancel-btn" onclick="cancelEdit(${cNumber})">취소</button>
              </div>
            </form>
          </div>
        `;
        textDiv.style.display = 'none';
      } else {
        cancelEdit(cNumber);
      }
    }

    /* 댓글 수정 취소 */
    function cancelEdit(cNumber) {
      const formDiv = document.getElementById(`reply-edit-form-${cNumber}`);
      const textDiv = document.getElementById(`reply-text-${cNumber}`);
      formDiv.innerHTML = '';
      textDiv.style.display = 'block';
    }

    /* 댓글 수정 저장 */
    function submitEditForm(event, cNumber) {
      event.preventDefault();
      const textarea = document.getElementById(`edit-textarea-${cNumber}`);
      const form = textarea.closest('form');
      form.action = `/post/reply/${cNumber}/update`;
      form.submit();
      return false;
    }
    
	window.onload = function () {
	    const likeBtn = document.getElementById('likeBtn');
	    const heart = document.getElementById('heart');
	    const likeText = document.getElementById('likeText');
	    
	    likeBtn.addEventListener('click', () => {
	        $.ajax({
	            url: '/post/like',
	            method: 'POST',
	            data: {
	                pNumber: /*[[${post.pNumber}]]*/0,
	                userId: /*[[${session.loginUser.userId}]]*/'',
	            },
	            success: data => {
	                if(data.liked){
	                    heart.innerText = '❤️' + data.likeCount; 
	                    likeText.innerText = '안 좋아요';
	                } else {
	                    heart.innerText = '🤍' + data.likeCount; 
	                    likeText.innerText = '좋아요';	
	                }
	            },
	            error: data => {
	                console.log(data);
	            }
	        })
	    })
	    
	    const applyBtn = document.getElementById('applyBtn');
	    if(applyBtn) {
	        applyBtn.addEventListener('click', () => {
	            $.ajax({
	                url: '/post/apply',
	                method: 'POST',
	                data: {
	                    pNumber: /*[[${post.pNumber}]]*/0,
	                    userId: /*[[${session.loginUser.userId}]]*/'',
	                },
	                success: data => {
	                    if(data == 0) {
	                        applyBtn.innerText = '참여완료';
	                        applyBtn.className = 'action-btn-disabled';
	                    } else {
	                        applyBtn.innerText = '참여하기';
	                        applyBtn.className = 'action-btn';
	                    }
	                },
	                error: data => {
	                    console.log(data);
	                }
	            })
	        })
	    }
	}
  </script>

</body>
</html>
