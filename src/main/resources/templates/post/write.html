<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시글 작성</title>

  <!-- 폰트 -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      padding: 30px;
    }

    /* 로고 */
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      color: #424B1F;
      margin-bottom: 10px;
      letter-spacing: 2px;
      text-align: center;
    }

    /* 페이지 제목 */
    .page-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
      text-align: center;
    }

    /* 구분선 */
    .divider {
      border: none;
      border-top: 1px solid #ccc;
      width: 90%;
      max-width: 500px;
      margin: 10px auto 20px auto;
    }

    .container {
      width: 90%;
      max-width: 500px;
      margin: 0 auto;
      background: #fff;
      padding: 20px 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    textarea {
      resize: none;
    }

    .btn-group {
      text-align: center;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      background-color: #424B1F;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button[type="reset"] {
      background-color: #888;
    }

    button:hover {
      background-color: #2f3616;
    }
  </style>
</head>
<body>

  <!-- 로고 -->
  <div class="logo">UNIVOL</div>

  <!-- 페이지 제목 -->
  <div class="page-title">게시글 작성</div>

  <hr class="divider">

  <div class="container">
    <!-- 구분선 -->


    <form class=writeform method="POST">
    <div>
    	<input/>
    </div>
      <div class="form-group">
        <label for="title">제목</label>
        <input type="text" id="title" placeholder="제목을 입력하세요">
      </div>

      <div class="form-group">
        <label for="place">봉사 장소</label>
        <input type="text" id="place" placeholder="봉사 장소를 입력하세요">
      </div>

      <div class="form-group">
        <label for="date">봉사 날짜</label>
        <input type="date" id="date">
      </div>

      <div class="form-group">
        <label for="content">내용</label>
        <textarea id="content" rows="10" placeholder="내용을 입력하세요"></textarea>
      </div>

      <div class="btn-group">
        <button type="submit">등록</button>
        <button type="reset">취소</button>
      </div>
    </form>
  </div>
<script>
	window.onload = () => {
		
	}
</script>
</body>
</html>
